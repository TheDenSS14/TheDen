# Fire Items

- type: entity
  parent: CandleSomberMantis
  id: CandleSomberPenthouse
  name: candle
  suffix: PENTHOUSE
  description: "A candle. That's all."
  components:
    - type: Sprite
      sprite: _SHA/Objects/Misc/candlespenthouse.rsi
    - type: Item
      sprite: _SHA/Objects/Misc/candlespenthouse.rsi
    - type: FireVisuals
      sprite: _SHA/Objects/Misc/candlespenthouse.rsi
      normalState: fire-big
      lightColor: "#FF9833"
    - type: Damageable
      damageModifierSet: Wood
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 5
        behaviors:
        - !type:SpawnEntitiesBehavior
          spawn:
              ScrapElectrum: # The dish it sits in
                min: 1
                max: 1
        - !type:PlaySoundBehavior
          sound:
            path: /Audio/Effects/drop.ogg
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - type: Tag
      tags: []

