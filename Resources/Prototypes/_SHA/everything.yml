# Chairs

- type: entity
  parent: SomberChairCushion
  id: SomberChairCushionFancy
  name: Break's meditation cushion
  suffix: Somber] [PENTHOUSE, JUST ONE
  description: "A textured meditation cushion filled with mnemolith powder, ringed by an electrum yantra to steady and shield the mind. The pattern hums faintly when someone settles in to focus."
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _SHA/Structures/Furniture/chairs.rsi
    state: somberfloorcushionfancy
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Items/Handling/cloth_drop.ogg
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Ambience/ambiruin6.ogg # She felt that.
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialCloth:
            min: 5
            max: 5
          ScrapElectrum:
            min: 5
            max: 5
          MaterialMnemolith1:
            min: 5
            max: 5
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Strap
    buckleSound:
      path: /Audio/_White/BloodCult/veilin.ogg
      params:
        volume: -2
        variation: 0.05
    unbuckleSound:
      path: /Audio/_White/BloodCult/veilout.ogg
      params:
        volume: -2
        variation: 0.05
    buckleOffset: "-0.015625,0.0" # Center her

