# Big fancy beds

- type: entity
  parent: BaseStructure
  id: BedPenthouseLower
  name: penthouse bed
  description: "A huge, plush bed draped in silky sheets."
  suffix: Fancy, Lower
  components:
  - type: HealOnBuckle
    damage:
      types:
        Poison: -1
        Cold: -1
        Blunt: -1
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,0.0,0.45,0.5"
        density: 190
        mask:
        - TableMask
  - type: Sprite
    sprite: _SHA/Structures/Furniture/furniture-64x32.rsi
    state: bedlower
    snapCardinals: false
    noRot: false
  - type: Strap
    position: Down
    rotation: -90
    buckleOffset: "-.1,0.29"
  - type: Transform
    anchored: true
  - type: Anchorable
  - type: Pullable
  - type: InteractionOutline
  - type: InteractionVerbs
    allowedVerbs:
    - HugObject
    - PetObject
    - KissObject
    - LickObject

- type: entity
  parent: BedPenthouseLower
  id: BedPenthouseUpper
  suffix: Fancy, Upper
  components:
  - type: Fixtures
