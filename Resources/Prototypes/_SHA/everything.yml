# Game Presets

- type: gamePreset
  id: BreakHome
  alias:
  - breakhome
  - home
  name: breakhome-title
  description: breakhome-description
  supportedMaps: HomeMapPool
  rules: []

# Game Map Pools

- type: gameMapPool
  id: HomeMapPool
  maps:
  - Infinity # TODO

# Parent

- type: entity
  id: BaseImmovableObject
  abstract: true
  components:
  - type: Transform
    anchored: true
  - type: Anchorable
    flags:
    - Anchorable
    delay: 3600 # Quit it

- type: entity
  id: MeditationChamberLight
  abstract: true
  components:
  - type: PointLight
    energy: 1
    radius: 3
    color: "#4dc4ff"

# Sound Collections

- type: soundCollection
  id: SoulTalk
  files:
    - /Audio/_SHA/soultalk1.ogg
    - /Audio/_SHA/soultalk2.ogg
    - /Audio/_SHA/soultalk3.ogg
    - /Audio/_SHA/soultalk4.ogg
    - /Audio/_SHA/soultalk5.ogg
    - /Audio/_SHA/soultalk6.ogg
    - /Audio/_SHA/soultalk7.ogg
    - /Audio/_SHA/soultalk8.ogg

- type: soundCollection
  id: Storage
  files:
    - /Audio/_SHA/storage1.ogg
    - /Audio/_SHA/storage2.ogg
    - /Audio/_SHA/storage3.ogg

# Typing Indicator

- type: typingIndicator
  id: break
  spritePath: /Textures/_SHA/Effects/speech.rsi
  typingState: break0
  idleState: break3
  offset: -.44, 1.16

- type: typingIndicator
  id: breakfaint
  spritePath: /Textures/_SHA/Effects/speech.rsi
  typingState: break0
  idleState: break3
  offset: -.36, 0.36

# Parallax

- type: parallax
  id: Bloom
  layers:
    - texture:
        !type:ImageParallaxTextureSource
        path: "/Textures/_SHA/Parallaxes/bloomcitylights.png"
      slowness: 0.98
      scale: "1.0,1.0"
    - texture:
        !type:ImageParallaxTextureSource
        path: "/Textures/_SHA/Parallaxes/bloomcloudslightpollution.png"
      slowness: 0.78
      scale: "0.5,0.5"
      scrolling: "0.30, -0.50"

# Contraband

- type: contrabandSeverity
  id: contrabandSeverityHeretic
  examineText: contraband-examine-text-heretic

- type: entity
  id: BaseHereticContraband
  abstract: true
  components:
  - type: Contraband
    severity: contrabandSeverityHeretic

# Weapon Arcs

- type: entity
  parent: WeaponArcStatic
  id: WeaponArcNone
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      sprite: _SHA/Effects/arcs.rsi
      state: none

- type: entity
  parent: WeaponArcPunch
  id: WeaponArcPunchDark
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      sprite: _SHA/Effects/arcs.rsi
      layers:
      - state: punchdark
        shader: unshaded

- type: entity
  parent: WeaponArcSmash
  id: WeaponArcSmashDark
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      sprite: _SHA/Effects/arcs.rsi
      layers:
      - state: smashdark
        shader: unshaded

# Projectiles

- type: entity
  parent: BaseBullet
  id: BulletGrasp
  name: mage hand
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 10
  - type: Sprite
    sprite: _SHA/Heretic/break-32x.rsi
    layers:
    - state: bulletgrasp
      shader: unshaded
  - type: PointLight
    radius: 1.5
    energy: 2
    color: "#00684E" # Mansus fire color
  - type: Ammo
    muzzleFlash: null
  - type: Projectile
    impactEffect: BulletImpactGrasp
    forceSound: true
    soundHit:
      path: /Audio/_SHA/resonatorblast.ogg
      params:
        volume: 0
        pitch: 1
        variation: 0.05
    damage:
      types:
        Holy: 0
  - type: StaminaDamageOnCollide
    damage: 150
  - type: FlyBySound
    sound:
      path: /Audio/_SHA/rites.ogg
      params:
        volume: -2
        pitch: 0.5
        variation: 0.05
  - type: Physics
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.3,0.15,0.3"
        hard: false
        mask:
        - Opaque

- type: entity
  parent: BulletImpactEffect
  id: BulletImpactGrasp
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.8
  - type: Sprite
    sprite: _SHA/Heretic/break-32x.rsi
    layers:
    - state: impactgrasp
      shader: unshaded
  - type: PointLight
    radius: 1.5
    energy: 2
    color: "#00684E" # Mansus fire color

- type: entity
  parent: BulletGrasp
  id: BulletGraspSoul
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: bulletgraspsoul
      shader: unshaded
  - type: PointLight
    radius: 0
    energy: 0
    color: "#ff0066"
  - type: Projectile
    impactEffect: BulletImpactGraspSoul
    soundHit:
      path: /Audio/_SHA/resonatorblast.ogg
      params:
        volume: -2
        pitch: 1
        variation: 0.05

- type: entity
  parent: BulletGraspSoul
  id: BulletGraspSoulSpread
  categories: [ HideSpawnMenu ]
  components:
  - type: ProjectileSpread
    proto: BulletGraspSoul
    count: 5
    spread: 15

- type: entity
  parent: BulletImpactGrasp
  id: BulletImpactGraspSoul
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: impactgraspsoul
      shader: unshaded
  - type: PointLight
    radius: 0
    energy: 0
    color: "#ff0066"

# Damage

- type: damageContainer
  id: Indestructible
  supportedTypes:
    - Holy

- type: damageModifierSet
  id: Indestructible
  coefficients:
    Holy: 0.0
  flatReductions:
    Holy: 100

