      types:
        Poison: -0.1
        Blunt: -0.1
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,0.45,0.45,0.0"
        density: 190
        mask:
        - TableMask
  - type: Sprite
    sprite: _SHA/Structures/Furniture/furniture.rsi
    state: bed
    noRot: true
  - type: Strap
    position: Down
    rotation: -90
    buckleOffset: "0.02,0"
