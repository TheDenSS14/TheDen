    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: _SHA/Structures/Walls/invisible.rsi
    state: invisible
  - type: Icon
    sprite: _SHA/Structures/Walls/invisible.rsi
    state: invisible
  - type: Physics
    bodyType: Static
  - type: Fixtures
