- type: entity
  parent: [BaseStructure, BaseObjectVerbsStructure]
  id: AltarSomberSanctum
  name: mnemolith altar
  suffix: SANCTUM
  description: "A broad, dark mnemolith altar, its basins slowly welling with a draught distilled from the stone itself. The surface is etched with a rare example of psychomantic script, legible to anyone who looks upon it: \"IN STILLNESS, ALL RETURNS.\""
  components:
  - type: Anchorable
  - type: Transform
  - type: Sprite
    sprite: _SHA/Structures/Furniture/Altars/Cults/sombersanctum.rsi
    layers:
      - state: altar
      - state: fill-1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
      - state: candles
        shader: unshaded
      - state: glow
        shader: unshaded
  - type: Icon
    sprite: _DEN/Structures/Furniture/Altars/Cults/somber.rsi
    state: altar
  - type: SolutionContainerManager
    solutions:
      fountain:
        maxVol: 120 # Enough mnemolith to get two people into the deepest level of dosing
        reagents:
        - ReagentId: MnemolithReagent
          Quantity: 120
  - type: SolutionRegeneration # The only infinite source of mnemolith
    solution: fountain
    generated:
      reagents:
      - ReagentId: MnemolithReagent
        Quantity: 4.0 # Takes five seconds to refill
  - type: Drink
    solution: fountain
    transferAmount: 5
  - type: DrawableSolution
    solution: fountain
  - type: DrainableSolution
    solution: fountain
  - type: ExaminableSolution
    solution: fountain
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 3
    fillBaseName: fill-
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak # Mnemolith is glassy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialMnemolith1:
            min: 30 # It's a massive slab of stone
            max: 30 # If you take the time to break it, you deserve it
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: PlaceableSurface
  - type: Climbable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.95,-0.35,0.95,0.35"
        density: 2000
        mask:
        - TableMask
        - LowImpassable
        layer:
        - TableLayer
  - type: Clickable
  - type: SacrificialAltar
  - type: Strap
    position: Down
    rotation: -90
  - type: HealOnBuckle # Slowly heals holy damage at the cost of slash damage
    damage:
      types:
        Slash: 0.5
        Holy: -0.25
  - type: EtherealLight # Dims around ethereal entities
  - type: PointLight
    radius: 3.5
    energy: 5
    softness: 1.22
    color: "#00684E" # Mansus grasp color
    autoRot: true
    mask: /Textures/_DEN/Effects/LightMasks/double_circle.png
  - type: AmbientSound
    range: 5
    volume: -8
    sound:
      path: /Audio/Ambience/Objects/gravity_gen_hum.ogg # So ominous it needs a quiet rumble
  - type: StealTarget
    stealGroup: AltarNanotrasen

