        shader: unshaded
      - state: glow
        shader: unshaded
  - type: Icon
    sprite: _SHA/Structures/Furniture/Altars/Cults/sombersanctum.rsi
    state: altar
  - type: SolutionContainerManager
    solutions:
      fountain:
        maxVol: 120 # Enough mnemolith to get two people into the deepest level of dosing
        reagents:
        - ReagentId: MnemolithReagent
          Quantity: 120
  - type: SolutionRegeneration # The only infinite source of mnemolith
    solution: fountain
    generated:
      reagents:
      - ReagentId: MnemolithReagent
        Quantity: 4.0 # Takes five seconds to refill
  - type: Drink
    solution: fountain
    transferAmount: 5
    delay: 3 # Longer in case they drink accidentally since it's also a cabinet and a bed
  - type: DrawableSolution
    solution: fountain
  - type: DrainableSolution
    solution: fountain
  - type: ExaminableSolution
    solution: fountain
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 3
    fillBaseName: fill-
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak # Mnemolith is glassy
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Ambience/ambiruin6.ogg
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialMnemolith1:
            min: 30 # It's a massive slab of stone
            max: 30 # If you take the time to break it, you deserve it
          ScrapElectrum:
            min: 3
            max: 5
          CandleSomberSanctumSmall:
            min: 1
            max: 6
      - !type:SpillBehavior { }
      - !type:EmptyAllContainersBehaviour
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Climbable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.95,-0.35,0.95,0.35"
        density: 2000
        mask:
        - TableMask
        - LowImpassable
        layer:
        - TableLayer
  - type: Clickable
  - type: SacrificialAltar
  - type: Strap
    buckleSound:
