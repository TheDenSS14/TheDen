# Walls

- type: entity
  parent: WindowSomberDirectionalTinted
  id: InvisibleOccluder
  name: darkness
  description: "You can't see anything..."
  suffix: PENTHOUSE, Edge
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Airtight
    airBlocked: false
    noAirWhenFullyAirBlocked: false
  - type: Sprite
    drawdepth: WallTops
    sprite: _SHA/Structures/Walls/invisible.rsi
    state: occluder
  - type: Icon
    sprite: _SHA/Structures/Walls/invisible.rsi
    state: occluder
  - type: Fixtures
    fixtures:
      fix1:
