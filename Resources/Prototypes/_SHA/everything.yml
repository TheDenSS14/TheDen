# Weapons

- type: entity
  parent: MantisMeleeGreatsword
  id: MantisMeleeGreatswordBreak
  suffix: PENTHOUSE, DO NOT MAP
  description: "It sees you.                                                                                                    It does not know you.                                                                                                    It only answers to her."
  components:
  - type: AntiPsionicWeapon # It knows her
    punishChances: 1
    punishSelfDamage: 1
    punishStunDuration: 1
  - type: MeleeRequiresWield # She just won't swing it if she's not wielding it
    fumbleOnAttempt: false
  - type: MeleeWeapon
    heavyStaminaCost: 0
  - type: DamageOtherOnHit
    staminaCost: 0
  - type: MeleeThrowOnHit # Throws you like a manifold
    speed: 10
    lifetime: 0.5
  - type: Reflect # No cheesing the boss fight
    reflectProb: 1.0
    spread: 0
    innate: true
  - type: DisarmMalus
    malus: 1.0
  - type: CultItem # Only she can wield it
  - type: EmbeddableProjectile
    minimumSpeed: 1
    autoRemoveDuration: 0

- type: entity
  parent: MantisMeleeGreatswordBreak
  id: MantisMeleeGreatswordBreakSummoned
  components:
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/_SHA/castsummoninstant+faustunsheath.ogg
      params:
        volume: 0
        variation: 0.05

- type: entity
  parent: MantisMeleeGreatswordSheath
  id: MantisMeleeGreatswordSheathFilledBreak
  suffix: Faust, Filled] [PENTHOUSE, DO NOT MAP
  components:
  - type: ContainerFill
    containers:
      mantisgreatsword:
      - MantisMeleeGreatswordBreak
  - type: Foldable
    folded: true
  - type: Clothing
    equippedPrefix: folded

- type: entity
  parent: [ BaseHereticContraband, BaseKnife, BaseAntiPsionicWeapon ]
  id: HereticBladeFleshBreakSummoned
  name: bloody blade
  suffix: DO NOT MAP] [BREAK
  description: "Her flesh and blood.                                                                                                    It stings the eye to behold.                                                                                                    Look away. Look away."
  components:
  - type: Sprite
    sprite: _SHA/Heretic/break-32x.rsi
    layers:
    - state: icon
    - state: icon-unshaded
      shader: unshaded
  - type: Item
    size: Normal
    sprite: _SHA/Heretic/break-64x.rsi
    inhandVisuals:
      left:
      - state: inhand-left-grasp
        shader: unshaded
      - state: inhand-left
      - state: inhand-left-unshaded
        shader: unshaded
      - state: inhand-left-unshaded-eye
        shader: unshaded
      right:
      - state: inhand-right-grasp
        shader: unshaded
      - state: inhand-right
      - state: inhand-right-unshaded
        shader: unshaded
      - state: inhand-right-unshaded-eye
        shader: unshaded
  - type: MeleeWeapon
    autoAttack: true
    heavyStaminaCost: 0
    attackRate: 0.6666
    angle: 90
    maxTargets: 10
    damage:
      types:
        Slash: 15
        Holy: 7.5
    soundHit:
      path: /Audio/_White/BloodCult/butcher.ogg
      params:
        volume: -2
        variation: 0.15
    soundSwing:
      path: /Audio/_DEN/Weapons/Melee/bigswoosh.ogg
      params:
        volume: -3
        variation: 0.15
    animation: WeaponArcPunch
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_SHA/scrape.ogg
      params:
        volume: -1
        pitch: 1.1
        variation: 0.1
  - type: LandAtCursor
  - type: DamageOtherOnHit
    staminaCost: 0
  - type: MeleeThrowOnHit
    speed: 6
    lifetime: 0.05
  - type: Reflect
    reflectProb: 1.0
    spread: 0
    innate: true
  - type: DisarmMalus
    malus: 1.0
  - type: ThrowingAngle
    angle: 225
  - type: CultItem
  - type: EmbeddableProjectile
    minimumSpeed: 1
    autoRemoveDuration: 0
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/_SHA/blood+enterblood.ogg
      params:
        volume: -2
        pitch: 1.0
  - type: SpawnItemsOnUse # To get around an annoying inhands layering issue with toggled items...
    items:
    - id: HereticBladeFleshBreak

- type: entity
  parent: [ HereticBladeFleshBreakSummoned, BaseKnifeSpinnable ]
  id: HereticBladeFleshBreak
  name: bloody blade
  suffix: DO NOT MAP] [BREAK
  description: "Her flesh and blood.                                                                                                    It stings the eye to behold.                                                                                                    Look away. Look away."
  components:
  - type: ItemToggle
    soundActivate:
      path: /Audio/_DEN/Weapons/Melee/bigswoosh.ogg # Spin
      params:
        volume: -5
        variation: 0.15
    soundDeactivate:
      path: /Audio/Effects/weak_hit2.ogg # Catch
      params:
        volume: -5
        pitch: 0.5
        variation: 0.05
  - type: ToggleableVisuals
    spriteLayer: null # Spinning it only changes the inhand sprites
    replaceMode: true # The original inhand sprites won't remain visible when toggled
    inhandVisuals:
      left:
      - state: inhand-left-grasp
        shader: unshaded
      - state: spinning-inhand-left
      - state: spinning-inhand-left-unshaded
        shader: unshaded
      - state: spinning-inhand-left-unshaded-eye
        shader: unshaded
      right:
      - state: inhand-right-grasp
        shader: unshaded
      - state: spinning-inhand-right
      - state: spinning-inhand-right-unshaded
        shader: unshaded
      - state: spinning-inhand-right-unshaded-eye
        shader: unshaded
  - type: EmitSoundOnSpawn
    sound: null

# Magic Effects

- type: entity
  parent: [ BaseHereticContraband, BaseItem, BaseAntiPsionicWeapon ]
  id: HereticMansusGraspBreak
  name: mansus grasp
  suffix: DO NOT MAP] [BREAK
  description: "The hand wreathed in false flame.                                                                                                    It pries at the world's threads.                                                                                                    The witch's will made manifest."
  components:
  - type: ItemToggle # You can flash a ritual circle by toggling it
    verbToggleOn: item-toggle-ritualon
    verbToggleOff: item-toggle-ritualoff
    soundActivate:
      path: /Audio/_SHA/castsummonfast.ogg
      params:
        volume: 0
        variation: 0.05
    soundDeactivate: /Audio/Effects/silence.ogg
  - type: UseDelay
    delay: 1.27
  - type: Appearance
  - type: ToggleableVisuals
    spriteLayer: null
    replaceMode: false
    inhandVisuals:
      left:
      - state: ritual-mirror-fast-break
        shader: unshaded
        offset: 0,-0.5
        loop: false
      right:
      - state: ritual-mirror-fast-break
        shader: unshaded
        offset: 0,-0.5
        loop: false
  - type: Sprite
    sprite: _SHA/Heretic/break-32x.rsi
    layers:
    - state: icon-grasp-left
      shader: unshaded
  - type: Item
    size: Ginormous
    sprite: _SHA/Heretic/break-96x.rsi
    inhandVisuals:
      left:
      - state: inhand-left-grasp
        shader: unshaded
      - state: inhand-left-grasp-summon
        shader: unshaded
        loop: false
      right:
      - state: inhand-right-grasp
        shader: unshaded
      - state: inhand-right-grasp-summon
        shader: unshaded
        loop: false
  - type: MeleeWeapon
    autoAttack: true
    heavyStaminaCost: 0
    attackRate: 0.6666
    angle: 90
    maxTargets: 1
    damage:
      types:
        Blunt: 10
        Holy: 5
        Structural: 25
    soundHit:
      path: /Audio/_SHA/repulseinstant.ogg
      params:
        volume: 0
        variation: 0.15
    soundSwing:
      path: /Audio/_DEN/Weapons/Melee/bigswoosh.ogg
      params:
        volume: -3
        variation: 0.15
    animation: WeaponArcPunch
    wideAnimation: WeaponArcSmash
  - type: MeleeThrowOnHit
    speed: 10
    lifetime: 0.5
  - type: Reflect
    reflectProb: 1.0
    spread: 0
    innate: true
  - type: DisarmMalus
    malus: 1.0
  - type: CultItem
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/_SHA/voidblink.ogg
      params:
        volume: -2
        pitch: 0.75
  - type: AmbientSound
    range: 5
    volume: -4
    sound:
      path: /Audio/Ambience/wisp_ambience.ogg
  - type: PointLight
    color: "#00684E" # Mansus fire color
  - type: DeleteOnDrop
  - type: Tool
    qualities:
      - Prying
  - type: Prying
  - type: Gun
    projectileSpeed: 9
    cameraRecoilScalar: 0
    fireOnDropChance: 0
    meleeCooldown: 0
    resetOnHandSelected: false
    showExamineText: false
    uniformSpread: true
    soundGunshot:
      path: /Audio/_SHA/rites.ogg
      params:
        volume: -1
        pitch: 0.5
        variation: 0.05
    soundEmpty: /Audio/Effects/silence.ogg
    fireRate: 3
    useKey: false
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 0.333
    rechargeSound: /Audio/Effects/silence.ogg
  - type: BasicEntityAmmoProvider
    proto: BulletGrasp
    capacity: 1
    count: 1

