  name: bloody blade
  suffix: DO NOT MAP] [BREAK
  description: "Her flesh and blood.                                                                                                    It stings the eye to behold.                                                                                                    Look away. Look away."
  components:
  - type: ItemToggle
    soundActivate:
      path: /Audio/_DEN/Weapons/Melee/bigswoosh.ogg # Spin
      params:
        volume: -3
        variation: 0.15
