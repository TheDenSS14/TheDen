          bounds: "-0.45,0.5,0.45,0.0"
        density: 190
        mask:
        - TableMask
  - type: Sprite
    state: bedupper
    snapCardinals: false
    noRot: false
  - type: Strap
    position: Down
    rotation: -90
    buckleOffset: "-.1,-0.08"

- type: entity
