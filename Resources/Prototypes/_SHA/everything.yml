# Game Presets

- type: gamePreset
  id: BreakHome
  alias:
  - breakhome
  - home
  name: breakhome-title
  description: breakhome-description
  supportedMaps: HomeMapPool
  rules: []

- type: gamePreset
  id: BreakHideout
  alias:
  - breakhideout
  - hideout
  name: breakhideout-title
  description: breakhideout-description
  supportedMaps: HideoutMapPool
  rules: []

# Game Map Pools

- type: gameMapPool
  id: HomeMapPool
  maps:
  - Infinity # TODO

- type: gameMapPool
  id: HideoutMapPool
  maps:
  - Infinity # TODO

# Parallax

- type: parallax
  id: Bloom
  layers:
    - texture:
        !type:ImageParallaxTextureSource
        path: "/Textures/_SHA/Parallaxes/bloomcitylights.png"
      slowness: 0.98
      scale: "1.0,1.0"
    - texture:
        !type:ImageParallaxTextureSource
        path: "/Textures/_SHA/Parallaxes/bloomcloudslightpollution.png"
      slowness: 0.78
      scale: "0.5,0.5"
      scrolling: "0.30, -0.50"

# Damage

- type: damageContainer
  id: Indestructible
  supportedTypes:
    - Holy

- type: damageModifierSet
  id: Indestructible
  coefficients:
    Holy: 0.0
  flatReductions:
    Holy: 100

