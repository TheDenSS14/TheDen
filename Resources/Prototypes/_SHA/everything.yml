# Game Presets

- type: gamePreset
  id: BreakHome
  alias:
  - breakhome
  - home
  name: breakhome-title
  description: breakhome-description
  supportedMaps: HomeMapPool
  rules: []

- type: gamePreset
  id: BreakHideout
  alias:
  - breakhideout
  - hideout
  name: breakhideout-title
  description: breakhideout-description
  supportedMaps: HideoutMapPool
  rules: []

# Game Map Pools

- type: gameMapPool
  id: HomeMapPool
  maps:
  - Infinity # TODO

- type: gameMapPool
  id: HideoutMapPool
  maps:
  - Infinity # TODO

# Damage

- type: damageContainer
  id: Indestructible
  supportedTypes:
    - Holy

- type: damageModifierSet
  id: Indestructible
  coefficients:
    Holy: 0.0
  flatReductions:
    Holy: 100

