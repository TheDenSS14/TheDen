# Walls

- type: entity
  parent: BaseStructure
  id: RailingInvisible
  name: ledge
  description: "You're an idiot. You'll fall. Get back."
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: _SHA/Structures/Walls/invisible.rsi
    state: invisible
  - type: Icon
    sprite: _SHA/Structures/Walls/invisible.rsi
    state: invisible
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.25"
        density: 1000
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Damageable
    damageContainer: Indestructible
    damageModifierSet: Indestructible

- type: entity
  parent: RailingInvisible
  id: RailingInvisibleOccluder
  name: darkness
  description: "You can't see anything..."
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: _SHA/Structures/Walls/invisible.rsi
    state: occluder
  - type: Icon
    sprite: _SHA/Structures/Walls/invisible.rsi
    state: occluder
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        hard: true
        density: 1000
        mask:
          - FullTileMask
        layer:
          - WallLayer
  - type: Occluder

- type: entity
  parent: WallSomber
  id: WallSomberSeethrough
  suffix: See-Through
  components:
  - type: Sprite
    sprite: _DEN/Structures/Walls/Somber/somber.rsi
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/somber.rsi
  - type: Tag
    tags:
    - Wall
  - type: IconSmooth
    key: walls
    base: wall
  - type: Occluder
    enabled: false

- type: entity
  parent: WallSomberDark
  id: WallSomberDarkSeethrough
  suffix: See-Through, Dark
  components:
  - type: Sprite
    sprite: _DEN/Structures/Walls/Somber/somberdark.rsi
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/somberdark.rsi
  - type: Tag
    tags:
    - Wall
  - type: IconSmooth
    key: walls
    base: wall
  - type: Occluder
    enabled: false

