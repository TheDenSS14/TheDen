- type: entity
  name: global positioning system
  parent: BaseHandheldComputer # den - battery powered! only for the screen though because gps component kind of doesnt care. its flava
  id: HandheldGPSBasic
  description: Helping lost spacemen find their way through the planets since 2016. It's technically battery powered, but only for the screen, not the little readout at the bottom. #den - haha battery no work
  components:
  - type: Item # den
    sprite: _DEN/Objects/Devices/gps.rsi
    heldPrefix: gps
  - type: Sprite # den
    sprite: _DEN/Objects/Devices/gps.rsi
    state: icon
    layers:
      - state: icon
      - state: gps
        shader: unshaded # technically not how a slcd screen works but we ball
        visible: true
        map: [ "enum.PowerDeviceVisualLayers.Powered" ]
  - type: Appearance # den
  - type: GenericVisualizer #den
    visuals:
      enum.PowerCellSlotVisuals.Enabled:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: HandheldGPS
  - type: PhysicalComposition
    materialComposition:
      Aluminum: 300
      Glass: 100
      Circuitry: 25
  - type: Tag
    tags:
    - GPS

- type: entity #den
  id: HandheldGPSBasicEmpty
  parent: HandheldGPSBasic
  suffix: Empty 
  components:
  - type: Sprite
    sprite: _DEN/Objects/Devices/gps.rsi
    state: icon
    layers:
      - state: icon
      - state: gps
        shader: unshaded
        visible: false
        map: [ "enum.PowerDeviceVisualLayers.Powered" ]
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default