- type: entity
  parent: BaseItem
  id: BaseHandheldStationMap
  name: station map
  description: Displays a readout of the current station.
  abstract: true
  components:
    - type: StationMap
#    - type: Sprite | den, commented out because A. abstract proto, no need sprite and B. no matter what i did to this it would keep using THIS sprite and not the new one  
#      sprite: Objects/Devices/tablets.rsi
#      layers:
#        - state: tablet
#        - state: generic
#          shader: unshaded
    - type: ActivatableUI
      inHandsOnly: true
      singleUser: true
      key: enum.StationMapUiKey.Key
    - type: Damageable
      damageContainer: Inorganic
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 100
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
    - type: UserInterface
      interfaces:
        enum.StationMapUiKey.Key:
          type: StationMapBoundUserInterface

- type: entity
  id: HandheldStationMap
  parent: [BaseHandheldStationMap, BaseHandheldComputer] 
  suffix: Handheld, Powered
  components: # den
  - type: Item
    sprite: _DEN/Objects/Tools/handheld_station_map.rsi
    heldPrefix: map
  - type: Sprite
    sprite: _DEN/Objects/Tools/handheld_station_map.rsi
    state: icon
    layers:
      - state: icon
      - state: map
        shader: unshaded
        visible: true
        map: [ "enum.PowerDeviceVisualLayers.Powered" ]
  - type: Appearance
  - type: GenericVisualizer 
    visuals:
      enum.PowerCellSlotVisuals.Enabled:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }


- type: entity
  id: HandheldStationMapEmpty
  parent: HandheldStationMap
  suffix: Handheld, Empty
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
  - type: Sprite
    sprite: _DEN/Objects/Tools/handheld_station_map.rsi
    state: icon
    layers:
      - state: icon
      - state: map
        shader: unshaded
        visible: false
        map: [ "enum.PowerDeviceVisualLayers.Powered" ]

