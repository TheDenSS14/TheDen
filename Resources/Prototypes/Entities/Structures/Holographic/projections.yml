- type: entity
  id: HolosignWetFloor
  name: wet floor sign
  description: The words flicker as if they mean nothing.
  placement:
    mode: SnapgridCenter
  suffix: Holo # TheDen
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    sprite: Structures/Holo/wetfloor.rsi
    state: icon
  - type: TimedDespawn
    lifetime: 90
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 30
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
  - type: Tag
    tags:
      - NoPaint

- type: entity
  id: HoloFan
  parent: BaseHolosign # DeltaV - don't include TimedDespawn
  name: holofan
  description: A barrier of hard light that blocks air, but nothing else.
  components:
  - type: Sprite
    sprite: _DEN/Structures/Holo/holofan.rsi # The Den - airlock resprite
    state: icon
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
            bounds: "-0.5,-0.5,0.5,0.5"
  - type: TimedDespawnDetailed
    despawnAfter: 300
    examineText: timed-despawn-holofan-examine
    startSound:
      path: /Audio/_DEN/holofan_sound_looped.ogg
  - type: Airtight
    noAirWhenFullyAirBlocked: false
  - type: Holofan # DeltaV - for whitelisting
#  - type: SpamEmitSound
#    enabled: false
#    minInterval: 3.2
#    maxInterval: 3.3
#    sound:
#      path: /Audio/_DEN/holofan_sound_looped.ogg
#      params:
#        maxDistance: 5
#        volume: 2

- type: entity
  id: HolosignSecurity
  parent: BaseHolosign
  name: holographic barrier
  description: A barrier of hard light that blocks movement, but pretty weak.
  components:
    - type: Physics
      bodyType: Static
      canCollide: true
    - type: Sprite
      sprite: Structures/Holo/security.rsi
      state: icon
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.5,-0.5,0.5,0.5"
          mask:
            - TableMask
          layer:
            - TableLayer
    - type: TimedDespawnDetailed
      despawnAfter: 300
      examineText: timed-despawn-holofan-examine
      startSound:
        path: /Audio/_DEN/holofan_sound_looped.ogg
    - type: Holobarrier # DEN - for whitelisting
    - type: PointLight
      enabled: true
      radius: 3
      color: red
    - type: Climbable
    - type: Clickable

- type: entity
  id: HolosignForcefield
  parent: HolosignWetFloor
  name: holographic force field
  description: A powerful temporal containment field that doesn't let anything through, not even a tesla or singularity.
  components:
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Sprite
    sprite: Structures/Holo/field.rsi
    state: icon
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
  - type: TimedDespawn
    lifetime: 180
  - type: PointLight
    enabled: true
    radius: 3
    color: blue
  - type: Clickable
  - type: ContainmentField
    throwForce: 0
  - type: Holobarrier # DEN - for whitelisting
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 60
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
