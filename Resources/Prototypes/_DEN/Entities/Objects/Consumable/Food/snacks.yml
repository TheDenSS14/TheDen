- type: entity
  name: chocolate bar
  parent: BaseItem
  id: FoodSnackChocolateMnemolith
  description: Tastes like cardboard.
  components:
  - type: Sprite
    sprite: Objects/Consumable/Food/snacks.rsi
    state: chocolatebar
  - type: Item
    heldPrefix: chocolatebar
    size: Tiny
  - type: Tag
    tags:
      - FoodSnack
  - type: SpawnItemsOnUse
    items:
      - id: FoodPacketChocolateTrash
      - id: FoodSnackChocolateBar
    sound:
      path: /Audio/Effects/unwrap.ogg

- type: entity
  name: chocolate bar
  parent: FoodSnackBase
  id: FoodSnackChocolateBarMnemolith
  description: Tastes like cardboard.
  suffix: Unwrapped # TheDen
  components:
  - type: FlavorProfile
    flavors:
      - chocolate
  - type: Sprite
    state: chocolatebar-open
  - type: Item
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 30
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
        - ReagentId: Theobromine
          Quantity: 3
        - ReagentId: CocoaPowder
          Quantity: 1
