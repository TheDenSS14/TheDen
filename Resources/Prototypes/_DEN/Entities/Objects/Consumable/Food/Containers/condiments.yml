- type: entity
  parent: BaseFoodCondimentPacket
  id: FoodCondimentPacketSyrup
  name: syrup
  description: Sticky, sweet syrup.
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Syrup
          Quantity: 10
  - type: Icon
    sprite: _DEN/Objects/Consumable/Food/syrup.rsi
    state: packet-syrup
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 2
    fillBaseName: packet-solid-

- type: entity
  parent: BaseFoodCondimentBottle
  id: FoodCondimentBottleSyrup
  name: syrup bottle
  description: Sticky, smoky, sweet syrup, perfectly to taste, so you can get it everywhere except on your food.
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Syrup
          Quantity: 30
  - type: Sprite
    sprite: _DEN/Objects/Consumable/Food/syrup.rsi
    layers:
    - state: bottle-empty
      map: ["enum.OpenableVisuals.Layer"]
    - state: bottle-alpha-6
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: true
    - state: label-syrup
  - type: Icon
    sprite: _DEN/Objects/Consumable/Food/syrup.rsi
    state: icon
  - type: Tag
    tags:
      - Syrup

- type: entity
  parent: BaseFoodCondimentPacket
  id: FoodCondimentPacketMayo
  name: mayonnaise
  description: A creamy sauce that usually contains egg.
  components:
    - type: SolutionContainerManager
      solutions:
        food:
          reagents:
            - ReagentId: Mayo
              Quantity: 10
    - type: Sprite
      layers:
        - state: packet-solid-2
          map: ["enum.SolutionContainerLayers.Fill"]
          visible: true
        - state: packet-layer
          map: ["enum.OpenableVisuals.Layer"]
        - state: packet-label
          color: blue
    - type: Icon
      sprite: _DEN/Objects/Consumable/Food/mayo_packet.rsi
      state: packet-mayo
    - type: Appearance
    - type: SolutionContainerVisuals
      maxFillLevels: 2
      fillBaseName: packet-solid-

- type: entity
  parent: [ BaseFoodShaker, BasePsionic ]
  id: BaseFoodShakerSomber
  abstract: true
  name: empty shaker
  suffix: Somber
  description: "A crystal shaker for spices."
  components:
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpillBehavior { }
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialEidolite1:
            min: 1
            max: 1
        transferForensics: true
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Sprite
    sprite: _DEN/Objects/Consumable/Food/condiments.rsi
    state: somber-shaker-empty
  - type: Icon
    sprite: _DEN/Objects/Consumable/Food/condiments.rsi
    state: somber-shaker-empty

- type: entity
  parent: BaseFoodShakerSomber
  id: FoodShakerSaltSomber
  name: salt shaker
  suffix: Somber
  description: "Pink salt. From the Space Himalayas, probably."
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: TableSalt
          Quantity: 20
  - type: Sprite
    state: somber-shaker-salt
  - type: Icon
    state: somber-shaker-salt
  - type: Tag
    tags:
      - SaltShaker

- type: entity
  parent: BaseFoodShakerSomber
  id: FoodShakerPepperSomber
  name: pepper shaker
  suffix: Somber
  description: "You already know what pepper is for."
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Blackpepper
          Quantity: 20
  - type: Sprite
    state: somber-shaker-pepper
  - type: Icon
    state: somber-shaker-pepper
  - type: Tag
    tags:
      - PepperShaker

- type: entity
  parent: BaseFoodShakerSomber
  id: FoodShakerMnemolithSomber
  name: mnemolith shaker
  suffix: Somber
  description: "A potent psionic drug in a cute little crystal shaker."
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: MnemolithReagent
          Quantity: 20
  - type: Sprite
    state: somber-shaker-mnemolith
  - type: Icon
    state: somber-shaker-mnemolith
