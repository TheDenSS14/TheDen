- type: entity
  parent: LunchboxGeneric
  id: LunchboxSomber
  name: alabaster lunchbox
  suffix: Somber Dinnerware
  description: "A compact lunchbox with a braided handle. It has a strangely ceremonial feel."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Storage/lunchbox.rsi
    layers:
    - state: somber
    - state: somber-open
      map: ["openLayer"]
  - type: Item
    sprite: _DEN/Objects/Storage/lunchbox.rsi
    heldPrefix: somber
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Items/trayhit1.ogg
      params:
        variation: 0.15
  - type: EmitSoundOnPickup
    sound: /Audio/Items/Handling/drinkglass_pickup.ogg
  - type: EmitSoundOnDrop
    sound: /Audio/Items/Handling/drinkglass_drop.ogg
  - type: EmitSoundOnLand
    sound: /Audio/Items/Handling/drinkglass_drop.ogg
  - type: PhysicalComposition
    materialComposition:
      Gold: 10
      Silver: 10
