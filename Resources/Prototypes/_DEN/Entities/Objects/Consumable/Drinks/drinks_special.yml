- type: entity
  parent: [ DrinkGlassCoupeShaped, BasePsionic ] # Breakable somber dishes should be psionic
  id: DrinkGlassCoupeShapedSomber
  name: eidolite chalice
  suffix: Somber Barware, Coupe
  description: "A swirling chalice shaped from eidolite crystal."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Consumable/Drinks/sombercoupeglass.rsi
  - type: Item
    sprite: _DEN/Objects/Consumable/Drinks/sombercoupeglass.rsi
  - type: PhysicalComposition
    materialComposition:
      Gold: 10
      Silver: 10
  - type: Destructible # They don't drop glass shards, and can't drop eidolite or electrum because they're too valuable
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpillBehavior { }
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

