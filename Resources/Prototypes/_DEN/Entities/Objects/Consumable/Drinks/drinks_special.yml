- type: entity
  parent: DrinkShaker
  id: DrinkShakerSomber
  name: electrum shaker
  suffix: Somber Barware
  description: "An expensive shaker made of a natural alloy of gold and silver."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Consumable/Drinks/sombershaker.rsi
  - type: Item
    sprite: _DEN/Objects/Consumable/Drinks/sombershaker.rsi
  - type: PhysicalComposition
    materialComposition:
      Gold: 10
      Silver: 10

