- type: entity
  parent: DrinkIceBucketSomber
  id: DrinkIceBucketSomberSauna
  name: electrum sauna bucket
  suffix: Somber Sauna
  description: "An unreasonably expensive bucket, for water that's fated to become steam."
  components:
  - type: Sprite
    state: icon-sauna
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: Water
          Quantity: 200

- type: entity
  parent: DrinkIceBucketSomberSauna
  id: DrinkIceBucketSomberSaunaSilvery
  name: electrum sauna bucket
  suffix: Somber Sauna, Silvery
  description: "An unreasonably expensive bucket, for water that's fated to become steam. The natural alloy contains more silver than usual."
  components:
  - type: Sprite
    state: icon-sauna-silvery

- type: entity
  parent: [ BaseDecorativeFixtureNoRot, DrinkGlassCoupeShaped, BasePsionic ] # Breakable somber dishes should be psionic
  id: DrinkGlassCoupeShapedSomber
  name: eidolite chalice
  suffix: Somber Barware, Coupe
  description: "A swirling chalice shaped from eidolite crystal."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Consumable/Drinks/sombercoupeglass.rsi
  - type: Item
    sprite: _DEN/Objects/Consumable/Drinks/sombercoupeglass.rsi
  - type: Icon
    sprite: _DEN/Objects/Consumable/Drinks/sombercoupeglass.rsi
    state: icon-combined
  - type: PhysicalComposition
    materialComposition:
      Gold: 10
      Silver: 10
  - type: Destructible # They don't drop glass shards, and can't drop eidolite or electrum because they're too valuable
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100 # Excess damage deletes the contents to save computation
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpillBehavior { }
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

