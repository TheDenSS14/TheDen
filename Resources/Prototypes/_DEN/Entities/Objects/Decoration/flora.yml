- type: entity
  parent: [ BaseTree, BasePsionic ] # Fuck it, psionic trees. That's why they glow, or some shit
  id: SomberAmaranthTree01
  name: amaranth tree
  suffix: "Somber, #1"
  description: "An exotic hardwood tree with faintly luminescent leaves. Its resin is toxic, making the lumber notoriously difficult to work."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Decoration/Flora/flora_amaranth_trees.rsi
    layers:
    - state: tree01
    - state: tree01glow
      shader: unshaded
  - type: MeleeSound
    soundGroups:
      Brute:
        collection: MetalThud # They're tough as hell
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/tree_fell.ogg
          params:
            volume: 5
            variation: 0.05
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          Log:
            min: 2
            max: 8

