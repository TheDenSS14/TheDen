- type: entity
  parent: FloorTileItemSteel
  id: FloorTileItemPool
  name: pool tile
  components:
  - type: Sprite
    sprite: _DEN/Objects/Tiles/pool.rsi
    state: pool
  - type: Item
    sprite: _DEN/Objects/Tiles/pool.rsi
  - type: FloorTile
    outputs:
    - Plating
    - FloorTilePool
  - type: Stack
    stackType: FloorTilePool

- type: entity
  parent: FloorTileItemPool
  id: FloorTileItemPoolDark
  name: dark pool tile
  components:
  - type: Sprite
    state: pool-dark
  - type: FloorTile
    outputs:
    - Plating
    - FloorTilePoolDark
  - type: Stack
    stackType: FloorTilePoolDark

- type: entity
  parent: BaseItem
  id: FloorTileItemInvisible
  name: invisible floor
  description: Nothing to see here.
  components:
  - type: Sprite
    sprite: _DEN/Objects/Tiles/tile.rsi
    state: invisible
  - type: Item
    sprite: _DEN/Objects/Tiles/tile.rsi
    size: Normal
  - type: FloorTile
    outputs:
    - Plating
    - FloorInvisible
  - type: Tag
    tags:
      - NoPaint
  - type: Stack
    stackType: FloorTileInvisible
