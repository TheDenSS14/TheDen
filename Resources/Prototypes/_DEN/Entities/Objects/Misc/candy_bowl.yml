- type: entity
  parent: [ CandyBowl, BasePsionic ] # Breakable somber dishes should be psionic
  id: CandyBowlSomber
  name: eidolite candy bowl
  suffix: Somber Dinnerware
  description: "An alabaster candy bowl, rimmed with electrum."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Misc/sombercandybowl.rsi
  - type: ItemMapper
    sprite: _DEN/Objects/Misc/sombercandybowl.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100 # Excess damage deletes the contents to save computation
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 15 # A bit tougher since it's made of stone
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -4
      - !type:EmptyAllContainersBehaviour
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
