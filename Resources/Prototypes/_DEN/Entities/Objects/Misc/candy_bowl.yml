- type: entity
  parent: [ CandyBowl, BasePsionic ] # Breakable somber dishes should be psionic
  id: CandyBowlSomber
  name: alabaster candy bowl
  suffix: Somber Dinnerware
  description: "An alabaster candy bowl, rimmed with electrum."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Misc/sombercandybowl.rsi
  - type: ItemMapper
    sprite: _DEN/Objects/Misc/sombercandybowl.rsi
  - type: DamageOnLand
    damage:
      types:
        Blunt: 0 # Just tossing it won't break it
  - type: DamageOnHighSpeedImpact
    minimumSpeed: 3 # You have to throw it harder
    damage:
      types:
        Blunt: 5 # Three hard throws will break it
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100 # Excess damage deletes the contents to save computation
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 15 # A bit tougher since it's made of stone
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:EmptyAllContainersBehaviour
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: EmitSoundOnPickup
    sound: /Audio/Items/Handling/drinkglass_pickup.ogg
  - type: EmitSoundOnDrop
    sound: /Audio/Items/Handling/drinkglass_drop.ogg
  - type: EmitSoundOnLand
    sound: /Audio/Items/Handling/drinkglass_drop.ogg
  - type: PhysicalComposition
    materialComposition:
      Gold: 10
      Silver: 10
