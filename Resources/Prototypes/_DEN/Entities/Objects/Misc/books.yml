# Somber Books Start
- type: entity
  parent: BookBase
  id: SomberBook1
  name: imposing tome # These are still filler books, but they're more specific
  suffix: Somber
  description: "It feels less like casual reading and more like something to be wrestled with."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Misc/somberbooks.rsi
    layers:
    - state: book-base1
      map : [ "cover" ]
    - state: book-icon1
      map : [ "icon" ]
  - type: RandomSprite # The colors match the fill sprites of the somber bookshelves
    available:
      - cover:
          book-base1: ""
          book-base2: ""
          book-base3: ""
          book-base4: ""
          book-base5: ""
      - icon:
          book-icon1: ""
          book-icon2: ""
          book-icon3: ""
          book-icon4: ""
          book-icon5: ""
  - type: Paper
    content: book-text-loremipsum # I much prefer this to randomly-generated stories, at least for serious libraries...

