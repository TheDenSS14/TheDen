- type: entity
  parent: BaseAmphora
  id: SomberElectrumAmphora
  name: electrum amphora
  description: "An electrum amphora with carved alabaster handles, possibly useful for carrying liquids."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Specific/Mantis/amphorae.rsi
    state: electrumamphora
  - type: Item
    sprite: _DEN/Objects/Specific/Mantis/amphorae.rsi
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:SpillBehavior
        solution: jar
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          ScrapElectrum:
            min: 2
            max: 4
  - type: DamageOtherOnHit
    staminaCost: 6
    damage:
      types:
        Blunt: 6
  - type: DamageOnLand
    damage:
      types:
        Blunt: 0
  - type: DamageOnHighSpeedImpact
    minimumSpeed: 20
    damage:
      types:
        Blunt: 0

- type: entity
  parent: Urn
  id: SomberElectrumUrn
  name: electrum urn
  description: "An electrum urn with a carved alabaster band, possibly useful for storing things."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Specific/Mantis/urn.rsi
  - type: Item
    size: Small
    sprite: _DEN/Objects/Specific/Mantis/urn.rsi
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          ScrapElectrum:
            min: 2
            max: 4
      - !type:EmptyAllContainersBehaviour
  - type: DamageOtherOnHit
    staminaCost: 6
    damage:
      types:
        Blunt: 6
  - type: Storage
    maxItemSize: Small
    grid:
      - 0,0,0,1
