- type: entity
  parent: HolyBookBible
  id: HolyBookQuran
  name: quran
  description: The holy book of Islam as revealed to the Prophet Muhammad.
  components:
  - type: Sprite
    sprite: Objects/Specific/Chapel/quran.rsi
    state: icon
  - type: Item
    size: Small
    sprite: Objects/Specific/Chapel/quran.rsi
  - type: Clothing

- type: entity
  parent: HolyBookBible
  id: HolyBookTanakh
  name: tanakh
  description: The foundational texts of Judaism, consisting of the Torah, the Nevi'im, and the Ketuvim.
  components:
  - type: Sprite
    sprite: _DEN/Objects/Specific/Chapel/tanakh.rsi
    state: icon
  - type: Item
    size: Small
    sprite: _DEN/Objects/Specific/Chapel/tanakh.rsi
  - type: Clothing

- type: entity
  parent: [HolyBookBible, BaseFoldable]
  id: HolyBookClarion
  name: clarion
  description: A tome of those who follow Lady Chaos, 'She-who-Tolls'. The rayskin leather is hydrophobic, and worked thin.
  components:
  - type: Sprite
    sprite: _DEN/Objects/Specific/Chapel/clarion.rsi
    layers:
    - state: open
      map: ["unfoldedLayer"]
    - state: closed
      map: ["foldedLayer"]
      visible: false
  - type: Item
    size: Small
  - type: Clothing
  - type: Appearance
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-close-verb
    unfoldVerbText: fold-open-verb
