- type: entity
  parent: Soap
  id: SoapSomberViolet
  name: fine soap
  suffix: Somber, Violet
  description: "A striped violet bar of soap. Smells like lavender and anise."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Specific/Janitorial/soap.rsi
    layers:
    - state: somberviolet-4
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    fillBaseName: somberviolet-
  - type: Item
    sprite: _DEN/Objects/Specific/Janitorial/soap.rsi
    heldPrefix: somberviolet
  - type: SolutionContainerManager
    solutions:
      soap:
        maxVol: 100
        reagents:
        - ReagentId: SoapReagent
          Quantity: 100
  - type: Residue
    residueAdjective: residue-slippery
    residueColor: residue-violet

