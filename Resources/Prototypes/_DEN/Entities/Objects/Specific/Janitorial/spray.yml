- type: entity
  name: mega space cleaner
  description: BLAM!-brand non-foaming space cleaner! Now in commercial size.
  id: MegaSprayBottleSpaceCleaner
  parent: MegaSprayBottle
  suffix: ""
  components:
    - type: SolutionContainerManager
      solutions:
        spray:
          maxVol: 250
          reagents:
            - ReagentId: SpaceCleaner
              Quantity: 250
    - type: Tag
      tags:
        - Spray

- type: entity
  parent: SprayBottle
  id: SprayBottleSomber
  name: spray bottle
  description: "A spray bottle made of unreasonably rare materials. Who the hell buys these things?"
  suffix: Somber, Empty
  components:
  - type: Sprite
    sprite: _DEN/Objects/Specific/Janitorial/somberspraybottle.rsi
    state: cleaner
  - type: Item
    sprite: _DEN/Objects/Specific/Janitorial/somberspraybottle.rsi

