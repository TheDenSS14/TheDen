  parent: [ FishingRodGolden, BaseAntiPsionicWeapon ]
  id: SomberFishingRod
  name: somber fishing rod
  description: "Is that a mnemolith hook? Oh god. Cast carefully."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Specific/Fishing/somber_rod.rsi
  - type: Item
    sprite: _DEN/Objects/Specific/Fishing/somber_rod.rsi

