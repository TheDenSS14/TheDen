    sprite: _DEN/Objects/Specific/Fishing/somber_lure.rsi
    layers:
    - state: icon
    - state: icon-unshaded
      shader: unshaded
  - type: Item
    sprite: _DEN/Objects/Specific/Fishing/somber_lure.rsi