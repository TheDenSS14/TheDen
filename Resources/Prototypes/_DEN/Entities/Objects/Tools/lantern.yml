- type: entity
  parent: [BaseItem, BaseAntiPsionicWeapon, BaseMantisContraband] # If I parented it to Lantern, it would have a battery slot...
  id: LanternMantis
  name: mantis lantern
  description: "An ornate lantern housing an eidolite pyramid that draws power from the noosphere. Stare too long and the gleam resolves into shapes you almost recognize, then promptly forget. For all its theatrics, the handle still hangs comfortably on your back."
  components:
    - type: Sprite
      sprite: _DEN/Objects/Specific/Mantis/lanternmantis.rsi
      layers:
      - state: icon
      - state: icon-crystal
      - state: icon-crystal-glow
        shader: unshaded
      - state: icon-crystal
        shader: unshaded
        visible: false
        map: ["light"]
    - type: Item
      sprite: _DEN/Objects/Specific/Mantis/lanternmantis.rsi
    - type: EtherealLight # Dims around ethereal entities
    - type: PointLight
      enabled: false
      energy: 3
      radius: 4
      softness: 1.22
      color: "#d9418d"
      netsync: false
    - type: Appearance
    - type: UseDelay
    - type: ToggleableVisuals
      replaceMode: false
      spriteLayer: light
      inhandVisuals:
        left:
          - state: on-inhand-left
            shader: unshaded
        right:
          - state: on-inhand-right
            shader: unshaded
      clothingVisuals:
        belt:
        - state: on-equipped-BELT
          shader: unshaded
        suitstorage:
        - state: on-equipped-SUITSTORAGE
          shader: unshaded
    - type: ItemTogglePointLight
    - type: ItemToggle
      soundActivate:
        path: /Audio/_DEN/Effects/crystalshimmer1.ogg
        params:
          volume: -2
          variation: 0.05
      soundDeactivate:
        path: /Audio/_DEN/Effects/crystalshimmer2.ogg
        params:
          volume: -2
          variation: 0.05
    - type: GenericVisualizer
      visuals:
        enum.ToggleableVisuals.Enabled:
          light:
            True: { visible: true }
            False: { visible: false }
    - type: StealTarget
      stealGroup: LAMP # The moths are coming the moths are coming
    - type: Clothing
      sprite: _DEN/Objects/Specific/Mantis/lanternmantis.rsi
      quickEquip: false
      slots:
        - Belt
        - suitStorage
    - type: MeleeWeapon # You can swing it like a weapon
      attackRate: 0.6666
      soundHit:
        path: /Audio/Weapons/block_metal1.ogg
        params:
          volume: -60 # Why is it so loud...
          variation: 0.05
      damage:
        types:
          Blunt: 5 # 7.5 DPS (same as Crowbar), or 9.38 DPS against psions
          Holy: 2.5 # 14.1 total DPS against psionic supernaturals
    - type: Tag
      tags:
      - Flashlight
      - MantisBeltStorable

- type: entity
  parent: BaseItem
  id: LanternSomber
  name: somber lamp
  description: "A palm-sized electrum sphere studded with shards of eidolite, each humming with faint noospheric charge. Its glow lingers in your vision, imprinting shapes you can't quite name."
  components:
    - type: Sprite
      sprite: _DEN/Objects/Tools/somberlamp.rsi
      layers:
      - state: icon
      - state: icon-crystal
      - state: icon-crystal-glow
        shader: unshaded
      - state: icon-crystal
        shader: unshaded
        visible: false
        map: ["light"]
    - type: Item
      sprite: _DEN/Objects/Tools/somberlamp.rsi
    - type: EtherealLight # Dims around ethereal entities
    - type: PointLight
      enabled: false
      energy: 2.4
      radius: 2.4
      softness: 1.22
      color: "#d9418d"
      netsync: false
    - type: Appearance
    - type: UseDelay
    - type: ToggleableVisuals
      replaceMode: false
      spriteLayer: light
      inhandVisuals:
        left:
          - state: on-inhand-left
            shader: unshaded
        right:
          - state: on-inhand-right
            shader: unshaded
    - type: ItemTogglePointLight
    - type: ItemToggle
      soundActivate:
        path: /Audio/_DEN/Effects/crystalshimmer1.ogg
        params:
          volume: -2
          variation: 0.05
      soundDeactivate:
        path: /Audio/_DEN/Effects/crystalshimmer2.ogg
        params:
          volume: -2
          variation: 0.05
    - type: GenericVisualizer
      visuals:
        enum.ToggleableVisuals.Enabled:
          light:
            True: { visible: true }
            False: { visible: false }
    - type: StealTarget
      stealGroup: LAMP # The moths are coming the moths are coming
    - type: LandAtCursor
    - type: ThrowingAngle
      angularVelocity: true
    - type: Tag
      tags:
      - Flashlight
      - MantisBeltStorable
