    sprite: _DEN/Clothing/OuterClothing/Coats/technicolor_black.rsi
  - type: Clothing
    sprite: _DEN/Clothing/OuterClothing/Coats/technicolor_black.rsi
  - type: TemperatureProtection
    heatingCoefficient: 1.0
    coolingCoefficient: 0.2

