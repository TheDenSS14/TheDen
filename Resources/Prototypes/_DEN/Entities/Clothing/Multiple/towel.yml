- type: entity
  parent: BaseTowel
  id: TowelColorMagenta
  name: magenta towel
  components:
  - type: Sprite
    layers:
    - state: icon
      color: "#b32d70"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#b32d70"
      right:
      - state: inhand-right
        color: "#b32d70"
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-HELMET
        color: "#b32d70"
      jumpsuit:
      - state: equipped-INNERCLOTHING
        color: "#b32d70"
      belt:
      - state: equipped-BELT
        color: "#b32d70"
      neck:
      - state: equipped-NECK
        color: "#b32d70"
  - type: Fiber
    fiberColor: fibers-magenta

