- type: entity
  parent: [ BaseSecretDoor, BasePsionic ]
  id: SomberSecretDoor
  name: somber wall
  description: "Layered with dark, rough mnemolith slabs in a tight grid to prevent psionic scrying."
  suffix: Secret Door, Signal-Friendly
  components:
  - type: Sprite
    sprite: _DEN/Structures/Doors/SecretDoors/sombersecretdoor.rsi
  - type: DoorSignalControl # Technically, everything below here could be used to metagame with a multitool...
  - type: DeviceNetwork # But since these probably aren't going on gameplay maps, let mappers toggle walls shifting with signals
    deviceNetId: Wireless
    receiveFrequencyId: BasicDevice
  - type: WirelessNetworkConnection
    range: 200
  - type: DeviceLinkSink
    ports:
      - Open
      - Close
      - Toggle
  - type: DeviceLinkSource
    ports:
    - DoorStatus
    lastSignals:
      DoorStatus: false

- type: entity
  parent: SomberSecretDoor
  id: SomberSecretDoorDark
  suffix: Secret Door, Dark, Signal-Friendly
  components:
  - type: Sprite
    sprite: _DEN/Structures/Doors/SecretDoors/sombersecretdoordark.rsi

- type: entity
  parent: SomberSecretDoor
  id: SomberSecretDoorSolid
  name: somber wall
  description: "Made of gloomy, patterned steel. It hums faintly, just below hearing."
  suffix: Secret Door, Solid, Signal-Friendly
  components:
  - type: Sprite
    sprite: _DEN/Structures/Doors/SecretDoors/sombersecretdoorsolid.rsi

- type: entity
  parent: SomberSecretDoorSolid
  id: SomberSecretDoorSolidDark
  name: somber wall
  suffix: Secret Door, Solid, Dark, Signal-Friendly
  components:
  - type: Sprite
    sprite: _DEN/Structures/Doors/SecretDoors/sombersecretdoorsoliddark.rsi
