# Designed to match the somber set, but they need to be useful for anyone, so I have to do all this for mappers
# Called "gloomy" so as not to clutter the list when "somber" is searched, though that will bring up the public and mantis versions

# Only mantis has a unique sprite since these won't be used commonly, but they do have labels so players can read their accesses by examining them
# Not perfect, but I never made the somber set to be used for a whole live station anyway, because I'd have to resprite the whole game lol

# Yes, this could be organized better, but I priorized ease of copy/paste and find/replace to keep myself something like sane


# PUBLIC AIRLOCKS (UNLOCKED)

# Public, Standard
- type: entity
  parent: [ Airlock, BasePsionic ]
  id: GloomyAirlock
  name: gloomy airlock
  suffix: Public] [Somber
  description: "It has survived much more, and much worse, than you."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Doors/Airlocks/Standard/somber.rsi

- type: entity
  parent: [ AirlockGlass, BasePsionic ]
  id: GloomyAirlockGlass
  name: gloomy glass airlock
  suffix: Public] [Somber
  description: "It has survived much more, and much worse, than you."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Doors/Airlocks/Glass/somber.rsi

# Public, Dark
