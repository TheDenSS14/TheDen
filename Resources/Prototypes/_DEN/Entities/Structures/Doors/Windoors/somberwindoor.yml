# Designed to match the somber set, but they need to be useful for anyone, so I have to do all this for mappers
# Called "gloomy" so as not to clutter the list when "somber" is searched, though that will bring up the public and mantis versions

# Yes, this could be organized better, but I priorized ease of copy/paste and find/replace to keep myself something like sane
# Also to clutter the entity list as little as possible, they're all secure since it's very rare to need to rip apart an unsecure windoor anyway


# PUBLIC WINDOORS (UNLOCKED)

# Public, Standard
- type: entity
  parent: WindoorSecure
  id: GloomyWindoorSecure
  name: gloomy windoor
  suffix: Public] [Somber
  description: "A gloomy, secure windoor, designed to match everything else in this place."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Doors/Windoors/somber.rsi

# Public, Dark
- type: entity
  parent: GloomyWindoorSecure
  id: GloomyWindoorSecureDark
  suffix: Public, Dark] [Somber
  components:
  - type: Sprite
    sprite: _DEN/Structures/Doors/Windoors/somberdark.rsi


# MANTIS WINDOORS (ALL VARIANTS IN ONE PLACE)

# Mantis (Locked)
- type: entity
  parent: GloomyWindoorSecure
  id: GloomyWindoorSecureMantisLocked
  suffix: Mantis-Locked] [Somber
  components:
  - type: Label
    currentLabel: mantis
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsMantis ]

- type: entity
  parent: GloomyWindoorSecure
  id: GloomyWindoorSecureMantisDarkLocked
  suffix: Mantis-Locked, Dark] [Somber
  components:
  - type: Label
    currentLabel: mantis
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsMantis ]


