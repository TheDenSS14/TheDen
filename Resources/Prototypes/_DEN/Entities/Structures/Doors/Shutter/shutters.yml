# White Light (Funny)
- type: entity
  parent: ShuttersFogWallClosed
  id: ShuttersFogWallBossClosed
  name: white light
  description: "A curtain of pale light fills the doorway. You have a bad feeling about this."
  suffix: Closed Fog Wall
  components:
  - type: Sprite
    sprite: _DEN/Structures/Doors/Shutters/fogwallboss.rsi
    layers:
      - state: closed
        map: [ "default" ]
      - state: frame
        visible: false
        map: [ "enum.DoorVisualLayers.Base", "animations" ]
      - state: closed-unshaded
        shader: unshaded
        map: [ "unshaded" ]
  - type: GenericVisualizer # Witchcraft to keep the door animated after it opens and closes, but now with an unshaded layer (help me)
    visuals:
      enum.DoorVisuals.State:
        animations:
          Closed: { visible: false }
          Closing: { visible: true }
          Open: { visible: false }
          Opening: { visible: true }
          Welded: { visible: false }
          Denying: { visible: false }
          Emagging: { visible: false }
        default:
          Closed: { visible: true, state: closed }
          Closing: { visible: false }
          Open: { visible: true, state: open }
          Opening: { visible: false }
          Welded: { visible: false }
          Denying: { visible: false }
          Emagging: { visible: false }
        unshaded:
          Closed: { visible: true, state: closed-unshaded }
          Closing: { visible: true, state: closing-unshaded }
          Open: { visible: false }
          Opening: { visible: true, state: opening-unshaded }
          Welded: { visible: false }
          Denying: { visible: false }
          Emagging: { visible: false }
  - type: Door
    closeTimeOne: 1.7
    closeTimeTwo: 1.7
    openTimeOne: 1.7
    openTimeTwo: 1.7
    openingAnimationTime: 3.2
    closingAnimationTime: 3.2
    openSound: /Audio/_DEN/Effects/fogopenlong.ogg
    closeSound: /Audio/_DEN/Effects/fogcloselong.ogg

- type: entity
  parent: ShuttersFogWallBossClosed
  id: ShuttersFogWallBossOpen
  name: white light
  description: "A curtain of pale light fills the doorway. You have a bad feeling about this."
  suffix: Open Fog Wall] [Right Click To Link
  components:
  - type: Door
    state: Open
  - type: Occluder
    enabled: false

- type: entity
  parent: ShuttersFogWallBossClosed
  id: ShuttersFogWallBossClosedAutolink
  suffix: Autolink (Fog), Closed Fog Wall
  components:
    - type: AutoLinkReceiver
      channel: Fog

- type: entity
  parent: ShuttersFogWallBossOpen
  id: ShuttersFogWallBossOpenAutolink
  suffix: Autolink (Fog), Open Fog Wall
  components:
    - type: AutoLinkReceiver
      channel: Fog
# Fog Walls End

# Toggleable invisible walls for mappers
- type: entity
  parent: MarkerBase
  id: MarkerShutterClosed
  name: invisible shutter
  suffix: Closed, Signal-Friendly] [Right Click To Link
  components:
  - type: Sprite
    layers:
      - sprite: _DEN/Markers/environment.rsi
        state: base-blue
        shader: unshaded
      - sprite: _DEN/Markers/environment.rsi
        shader: unshaded
        state: shutter
  - type: PlacementReplacement
    key: blocker
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.03125,0.5,0" # Just one pixel thick, just below the center of the tile
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 1000
  - type: Physics
    canCollide: true
  - type: Airtight
    airBlocked: false # People don't need to suffocate because of an invisible wall
  - type: Door # Instant and silent
    closeTimeOne: 0
    closeTimeTwo: 0
    openTimeOne: 0
    openTimeTwo: 0
    openingAnimationTime: 0
    closingAnimationTime: 0
    bumpOpen: false
    clickOpen: false
    openDrawDepth: Effects
    closedDrawDepth: Effects
    canCrush: false
    doorStunTime: 0
    crushDamage:
      types:
        Blunt: 0
    performCollisionCheck: true
    canPry: false
    changeAirtight: false # Imagine suddenly spacing a room with this
    openSound: /Audio/Effects/silence.ogg
    closeSound: /Audio/Effects/silence.ogg
  - type: Rotatable
  - type: DoorSignalControl
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: BasicDevice
  - type: WirelessNetworkConnection
    range: 200
  - type: DeviceLinkSink
    ports:
      - Open
      - Close
      - Toggle
  - type: DeviceLinkSource
    ports:
    - DoorStatus
    lastSignals:
      DoorStatus: false

- type: entity
  parent: MarkerShutterClosed
  id: MarkerShutterOpen
  suffix: Open, Signal-Friendly] [Right Click To Link
  components:
  - type: Door
    state: Open
  - type: Physics
    canCollide: false

- type: entity
  parent: MarkerShutterClosed
  id: MarkerShutterClosedAutolink
  suffix: Autolink (Invisible Shutter), Closed
  components:
    - type: AutoLinkReceiver
      channel: InvisShutter

- type: entity
  parent: MarkerShutterOpen
  id: MarkerShutterOpenAutolink
  suffix: Autolink (Invisible Shutter), Open
  components:
    - type: AutoLinkReceiver
      channel: InvisShutter
