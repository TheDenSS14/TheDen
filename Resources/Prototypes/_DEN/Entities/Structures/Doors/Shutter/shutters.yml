# Purple-Black Fog (Resembles shadow anomaly fog and has a slower framerate to match, includes a variant that spawns shadow basalt)

- type: entity
  parent: ShuttersFogWallClosed
  id: ShuttersFogWallShadowClosed
  name: dark haze
  description: "A wall of heavy, roiling fog, contained by some unseen mechanism so it cannot spread. Shapes drift within like something half-formed."
  suffix: No Basalt, Closed Fog Wall
  components:
  - type: Sprite
    sprite: _DEN/Structures/Doors/Shutters/fogwallshadow.rsi
  - type: Door # Aligns the appearance of the occluder line with the occluding state of the door
    closeTimeOne: 1.4
    closeTimeTwo: 1.4
    openTimeOne: 1.4
    openTimeTwo: 1.4

- type: entity
  parent: ShuttersFogWallOpen
  id: ShuttersFogWallShadowOpen
  name: dark haze
  description: "A wall of heavy, roiling fog, contained by some unseen mechanism so it cannot spread. Shapes drift within like something half-formed."
  suffix: No Basalt, Open Fog Wall] [Right Click To Link
  components:
  - type: Sprite
    sprite: _DEN/Structures/Doors/Shutters/fogwallshadow.rsi
  - type: Door
    closeTimeOne: 1.4
    closeTimeTwo: 1.4
    openTimeOne: 1.4
    openTimeTwo: 1.4

- type: entity
  parent: ShuttersFogWallShadowClosed
  id: ShuttersFogWallShadowBasaltClosed
  suffix: Spawns Basalt, Closed Fog Wall
  components:
  - type: RandomSpawner # Spawns floor crystals like real dark haze
    deleteSpawnerAfterSpawn: false
    rareChance: 0
    offset: 0.2
    chance: 1
    prototypes:
      - ShadowBasaltRandom

- type: entity
  parent: ShuttersFogWallShadowOpen
  id: ShuttersFogWallShadowBasaltOpen
  suffix: Spawns Basalt, Open Fog Wall] [Right Click To Link
  components:
  - type: RandomSpawner # Spawns floor crystals like real dark haze
    deleteSpawnerAfterSpawn: false
    rareChance: 0
    offset: 0.2
    chance: 1
    prototypes:
      - ShadowBasaltRandom

