- type: entity
  parent: CrateCoffin
  id: CrateCoffinSomber
  name: amaranth coffin
  description: "An amaranth coffin with electrum accents and a plush green interior. There are coins embedded in the lid that rest over the eyes of the dead."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Storage/Crates/sombercoffin.rsi
  - type: Icon
    sprite: _DEN/Structures/Storage/Crates/sombercoffin.rsi
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 3
            max: 3
          ScrapElectrum:
            min: 1
            max: 3
