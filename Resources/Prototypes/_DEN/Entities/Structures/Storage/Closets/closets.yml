# Somber lockers start
- type: entity
  parent: ClosetBase
  id: SomberCloset
  name: somber cabinet
  description: "An expensive cabinet made of gloomy, patterned wood."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Storage/sombercloset.rsi
    layers:
    - state: base
      map: ["enum.StorageVisualLayers.Base"]
    - state: door-closed
      map: ["enum.StorageVisualLayers.Door"]
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
  - type: Appearance
  - type: EntityStorageVisuals
    stateBaseClosed: base
    stateDoorOpen: door-open
    stateDoorClosed: door-closed
  - type: StaticPrice
    price: 125
  - type: EntityStorage
    closeSound:
      path: /Audio/Effects/woodenclosetclose.ogg
      params:
        volume: -4
    openSound:
      path: /Audio/Effects/woodenclosetopen.ogg
      params:
        volume: -4
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.40625,0.21875,0.40625"
        density: 150
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 3
            max: 3
          ScrapElectrum:
            min: 1
            max: 3
      - !type:EmptyAllContainersBehaviour
  - type: PaperLabel
    labelSlot:
      insertVerbText: Attach Label
      ejectVerbText: Remove Label
      whitelist:
        components:
        - Paper

- type: entity
  parent: SomberCloset
  id: SomberClosetLocker
  name: somber cabinet
  suffix: Locking
  description: "An expensive, locking cabinet made of gloomy, patterned wood."
  components:
  - type: AccessReader
  - type: Lock
  - type: LockVisuals
  - type: Sprite
    layers:
    - state: base
      map: ["enum.StorageVisualLayers.Base"]
    - state: door-closed
      map: ["enum.StorageVisualLayers.Door"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]

- type: entity
  parent: SomberCloset
  id: SomberFreezer
  name: somber refrigerator
  suffix: Freezer] [No Lock
  description: "A glossy, brushed-metal refrigerator."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Storage/somberfridge.rsi
  - type: EntityStorage
    closeSound:
      path: /Audio/Effects/closetclose.ogg
    openSound:
      path: /Audio/Effects/closetopen.ogg
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 3
            max: 3
          ScrapElectrum:
            min: 1
            max: 3
      - !type:EmptyAllContainersBehaviour
  - type: ExplosionResistance
    damageCoefficient: 0.90 # Funny
  - type: AntiRottingContainer
  - type: Transform
    anchored: true

- type: entity
  parent: SomberFreezer
  id: SomberFreezerLocker
  suffix: Freezer] [Locked
  components:
  - type: AccessReader
    access: [["Kitchen"]]
  - type: Lock
  - type: LockVisuals
  - type: Sprite
    layers:
    - state: base
      map: ["enum.StorageVisualLayers.Base"]
    - state: door-closed
      map: ["enum.StorageVisualLayers.Door"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]

- type: entity
  parent: SomberFreezer
  id: SomberFreezerLeft
  name: somber refrigerator (left)
  suffix: Freezer, Double] [No Lock
  description: "A glossy, brushed-metal refrigerator with twice the storage of a standard model."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Storage/somberfridgeleft.rsi

- type: entity
  parent: SomberFreezerLocker
  id: SomberFreezerLeftLocker
  name: somber refrigerator (left)
  suffix: Freezer, Double] [Locked
  description: "A glossy, brushed-metal refrigerator with twice the storage of a standard model."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Storage/somberfridgeleft.rsi

- type: entity
  parent: SomberFreezerLeft
  id: SomberFreezerRight
  name: somber refrigerator (right)
  components:
  - type: Sprite
    sprite: _DEN/Structures/Storage/somberfridgeright.rsi

- type: entity
  parent: SomberFreezerLeftLocker
  id: SomberFreezerRightLocker
  name: somber refrigerator (right)
  components:
  - type: Sprite
    sprite: _DEN/Structures/Storage/somberfridgeright.rsi

