# Pillars (see SomberMemorial for the monuments)

- type: entity
  parent: [ Memorial, BasePsionic ]
  id: SomberPillarTaller
  name: mnemolith pillar
  suffix: Taller
  description: "A mnemolith pillar etched with dense, repeating patterns. The stone seems to bear a weight you cannot see."
  components:
  - type: Transform
    anchored: false # So it can use other snapping modes
  - type: SpriteFade
  - type: Sprite
    noRot: true
    offset: -0.015625,1.15625 # 37.5 pixels up, 0.5 pixels left, to center them on tiles a bit better
    drawdepth: Mobs # Just don't put them against doors
    sprite: _DEN/Structures/Decoration/somberpillar.rsi
    state: pillartaller
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.09375,0.25,0.40625"
        density: 1000
        layer:
        - WallLayer

- type: entity
  parent: SomberPillarTaller
  id: SomberPillarTall
  suffix: Tall
  components:
  - type: Sprite
    state: pillartall

- type: entity
  parent: SomberPillarTaller
  id: SomberPillarShort
  suffix: Short
  components:
  - type: Sprite
    state: pillarshort

- type: entity
  parent: SomberPillarTaller
  id: SomberPillarStoneTaller
  name: raw mnemolith column
  suffix: Taller
  description: "A rough hexagonal column of raw mnemolith that appears to have grown straight from the floor. It reacts to nearby thoughts, cutting new patterns into itself around powerful psions."
  components:
  - type: Sprite
    state: stonecolumntaller

- type: entity
  parent: SomberPillarStoneTaller
  id: SomberPillarStoneTall
  suffix: Tall
  components:
  - type: Sprite
    state: stonecolumntall

- type: entity
  parent: SomberPillarStoneTaller
  id: SomberPillarStoneShort
  suffix: Short
  components:
  - type: Sprite
    state: stonecolumnshort

- type: entity
  parent: SomberPillarStoneTaller
  id: SomberPillarStoneShorter
  suffix: Shorter
  components:
  - type: Sprite
    state: stonecolumnshorter

# Pillars with braziers attached
# Unfortunately placing them separately sometimes causes layering issues... If there's a way to change render order to force braziers on top of pillars, we should do that instead

# Pillars with psionic fire (blue)
- type: entity
  parent: [ SomberPillarTaller, SomberHangingBrazier ]
  id: SomberPillarTallerBrazier
  suffix: Brazier, Taller, Signal-Friendly
  description: "A mnemolith pillar etched with dense, repeating patterns. The stone seems to bear a weight you cannot see. An electrum brazier hangs from its side."
  components:
  - type: Sprite
    layers:
      - state: pillartaller
        sprite: _DEN/Structures/Decoration/somberpillar.rsi
      - state: fireplace
        sprite: _DEN/Structures/Decoration/SomberPillarBraziers/somberhangingbrazierpillartall.rsi
      - state: fireplacefestive
        sprite: _DEN/Structures/Decoration/SomberPillarBraziers/somberhangingbrazierpillartall.rsi
        map: ["christmas"]
        visible: false
      - state: fireplace_fire
        sprite: _DEN/Structures/Decoration/SomberPillarBraziers/somberhangingbrazierpillartall.rsi
        shader: unshaded
        visible: false
        map: ["light"]
  - type: Physics
    canCollide: true

