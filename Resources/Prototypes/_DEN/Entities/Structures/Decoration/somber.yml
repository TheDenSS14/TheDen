# Floor plates that look nice under the stone columns

- type: entity
  parent: [ BaseStructure, BasePsionic ]
  id: SomberElectrumFocus
  name: electrum resonator
  suffix: Somber Floor Decor, Fits Under Columns, Etc.
  description: "A psionic lattice that resonates softly, shaping the flow of the noosphere above it."
  components:
  - type: Transform
    anchored: false # So it can use other snapping modes
  - type: Sprite
    noRot: true
    drawdepth: FloorObjects
    sprite: _DEN/Structures/Furniture/chairs.rsi # No need to duplicate a sprite just because it's not being a chair here
    layers:
    - state: sombercushion-underlay
    - state: sombercushion-underlay-unshaded
      shader: unshaded
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.375,-0.25,0.375,0.25"
        hard: false
        density: 100
        mask:
        - MachineMask
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialMnemolith1:
            min: 2
            max: 3
          ScrapElectrum:
            min: 1
            max: 2
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak

# Floating armillary spheres

- type: entity
  parent: [ BaseStructure, BasePsionic ]
  id: SomberArmillary
  name: armillary
  suffix: Somber, Electrum
  description: "An intricate electrum armillary suspended in the air, spinning far too quickly to reflect any real celestial motion. Whatever it measures must belong to the noosphere rather than the sky."
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    noRot: true
    drawdepth: Overdoors
    sprite: _DEN/Structures/Decoration/somberarmillary.rsi
    layers:
    - state: shadow # There's also shadow-hard if people don't like the blurred pixels
    - state: gold
      offset: 0.0,1.5 # 48 pixels up so people can visually walk under them
    - state: gold-unshaded
      offset: 0.0,1.5
      shader: unshaded
  - type: Transform
    anchored: false # So it can use other snapping modes
  - type: SpriteFade
  - type: RequireProjectileTarget # Bullets should generally go under or through it
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.25
        density: 200
        mask:
        - FlyingMobMask
        layer:
        - FlyingMobLayer
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/metal_slam2.ogg
          params:
            volume: -4
            variation: 0.15
  - type: AmbientSound
    range: 5
    volume: -4
    sound:
      path: /Audio/_DEN/Ambience/Objects/armillary.ogg

- type: entity
  parent: SomberArmillary
  id: SomberArmillarySilver
  name: armillary
  suffix: Somber, Mu-Metal
  description: "An intricate mu-metal armillary suspended in the air, spinning far too quickly to reflect any real celestial motion. Whatever it measures must belong to the noosphere rather than the sky."
  components:
  - type: Sprite
    layers:
    - state: shadow
    - state: silver
