    snapCardinals: false
    noRot: false
    layers:
    - state: halfringfountain
    - state: halfringstreams
    - state: halfringstreamshine
      shader: unshaded
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.75,0.45,0.75,1.5"
        hard: false
        density: 1000
        layer:
