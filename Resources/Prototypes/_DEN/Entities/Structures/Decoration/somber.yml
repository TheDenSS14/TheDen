# Pillars (see SomberMemorial for the monuments)

- type: entity
  parent: [ Memorial, BasePsionic ]
  id: SomberPillarTall
  name: mnemolith pillar
  suffix: Tall
  description: "A mnemolith pillar etched with dense, repeating patterns. The stone seems to bear a weight you cannot see."
  components:
  - type: SpriteFade
  - type: Sprite
    noRot: true
    offset: "0.0,1.0"
    drawdepth: Mobs # Just don't put them against doors
    sprite: _DEN/Structures/Decoration/somberpillar.rsi
    state: pillartall
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 1000
        layer:
        - WallLayer

- type: entity
  parent: SomberPillarTall
  id: SomberPillarTaller
  suffix: Taller
  components:
  - type: Sprite
    state: pillartaller

- type: entity
  parent: SomberPillarTall
  id: SomberPillarStoneTaller
  name: raw mnemolith column
  suffix: Taller
  description: "A rough hexagonal column of raw mnemolith that appears to have grown straight from the floor. It seems to resonate with nearby thoughts, and etches new patterns into itself around powerful psions."
  components:
  - type: Sprite
    state: stonecolumntaller

- type: entity
  parent: SomberPillarStoneTaller
  id: SomberPillarStoneTall
  suffix: Tall
  components:
  - type: Sprite
    state: stonecolumntall

- type: entity
  parent: SomberPillarStoneTaller
  id: SomberPillarStoneShort
  suffix: Short
  components:
  - type: Sprite
    state: stonecolumnshort

- type: entity
  parent: SomberPillarStoneTaller
  id: SomberPillarStoneShorter
  suffix: Shorter
  components:
  - type: Sprite
    state: stonecolumnshorter
