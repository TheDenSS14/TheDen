# Round Fountains

- type: entity
  parent: [ BaseStructure, BasePsionic ]
  id: FountainSomber
  name: somber fountain
  description: "A carved mnemolith basin crowned with electrum spouts, spilling streams of water into drains set into the floor below."
  suffix: Floor, Basin
  components:
  - type: Sprite
    snapCardinals: false
    noRot: true
    drawdepth: Mobs
    sprite: _DEN/Structures/Decoration/somberfountains-96x.rsi
    layers:
    - state: fountain
    - state: fountainwater
    - state: fountainwatershine
      shader: unshaded
    - state: fountainstreams
    - state: fountainstreamshine
      shader: unshaded
  - type: SolutionContainerManager
    solutions:
      fountain:
        maxVol: 100
  - type: SolutionRegeneration
    solution: fountain
    generated:
      reagents:
      - ReagentId: Water
        Quantity: 100
  - type: Drink
    solution: fountain
  - type: DrawableSolution
    solution: fountain
  - type: DrainableSolution
    solution: fountain
  - type: ExaminableSolution
    solution: fountain
  - type: Prayable
    sentMessage: prayer-popup-notify-fountainwish-sent
    notificationPrefix: prayer-chat-notify-fountainwish
    verb: prayer-verbs-fountainwish
    verbImage: null
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.875
        density: 1000
        layer:
        - WallLayer
  - type: AmbientSound
    volume: -4
    range: 10
    sound:
      path: /Audio/_DEN/Effects/Fluids/waterfall.ogg

- type: entity
  parent: [ FloorDrainSomber, BasePsionic ] # Fuck it, being built under mnemolith makes them absorb noospheric energy or something
  id: FountainSomberDrains
  name: somber fountain drains
  description: "An artful array of electrum drains set into the floor."
  suffix: Floor
  components:
  - type: Sprite
    snapCardinals: false
    noRot: true
    drawdepth: FloorObjects
    sprite: _DEN/Structures/Decoration/somberfountains-96x.rsi
    layers:
    - state: fountaindrains
    - state: fountaindrains-fill-1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    fillBaseName: fountaindrains-fill-
    solutionName: drainBuffer

- type: entity
  parent: FountainSomber
  id: FountainSomberRingHalf
  name: somber fountain
  description: "A carved mnemolith ring crowned with electrum spouts, spilling streams of water into drains set into the floor below."
  suffix: Wall
  components:
  - type: Sprite
    snapCardinals: false
    noRot: false
    layers:
    - state: halfringfountain
    - state: halfringstreams
    - state: halfringstreamshine
      shader: unshaded
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.75,0.45,0.75,1.5"
        hard: false
        density: 1000
        layer:
        - WallLayer

- type: entity
  parent: FountainSomberDrains
  id: FountainSomberRingHalfDrains
  name: somber fountain drains
  description: "An artful array of electrum drains set into the floor."
  suffix: Wall
  components:
  - type: Sprite
    snapCardinals: false
    noRot: false
    layers:
    - state: halfringfountaindrains
    - state: halfringfountaindrains-fill-1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    fillBaseName: halfringfountaindrains-fill-
    solutionName: drainBuffer

- type: entity
  parent: FountainSomberRingHalf
  id: FountainSomberRingQuarter
  name: somber fountain
  description: "A carved mnemolith ring crowned with electrum spouts, spilling streams of water into drains set into the floor below."
  suffix: Corner
