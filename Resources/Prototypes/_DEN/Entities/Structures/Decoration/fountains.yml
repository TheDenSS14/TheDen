- type: entity
  parent: BaseStructure
  id: FountainSomber
  name: somber fountain
  description: "A carved mnemolith basin crowned with electrum spouts, spilling streams of water into drains set into the floor below."
  components:
  - type: Sprite
    noRot: true
    drawdepth: Overdoors
    sprite: _DEN/Structures/Decoration/somberfountains-96x.rsi
    layers:
    - state: fountain
    - state: water
    - state: watershine
      shader: unshaded
    - state: streams
    - state: streamshine
      shader: unshaded
  - type: SolutionContainerManager
    solutions:
      fountain:
        maxVol: 100
  - type: SolutionRegeneration
    solution: fountain
    generated:
      reagents:
      - ReagentId: Water
        Quantity: 100
  - type: Drink
    solution: fountain
  - type: DrawableSolution
    solution: fountain
  - type: DrainableSolution
    solution: fountain
  - type: ExaminableSolution
    solution: fountain
  - type: Prayable
    sentMessage: prayer-popup-notify-fountainwish-sent
    notificationPrefix: prayer-chat-notify-fountainwish
    verb: prayer-verbs-fountainwish
    verbImage: null
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.875
          offset: "0.0,0.453125"
        density: 1000
        layer:
        - WallLayer

- type: entity
  parent: FloorDrainSomber
  id: FountainSomberDrains
  name: somber fountain drains
  description: "An artful array of electrum drains set into the floor."
  suffix: ""
  components:
  - type: Sprite
    noRot: true
    drawdepth: FloorObjects
    sprite: _DEN/Structures/Decoration/somberfountains-96x.rsi
    layers:
    - state: fountaindrains
    - state: fountaindrains-fill-1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    fillBaseName: fountaindrains-fill-
    solutionName: drainBuffer

- type: entity
  parent: FountainSomber
  id: FountainSomberRing
  name: somber fountain ring
  description: "A carved mnemolith ring crowned with electrum spouts, spilling streams of water into drains set into the floor below."
  suffix: North Wall
  components:
  - type: Sprite
    snapCardinals: false
    noRot: false
    layers:
    - state: ringfountain
    - state: ringstreams
    - state: ringstreamshine
      shader: unshaded
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.75,0.45,0.75,1.5"
        hard: false
        density: 1000
        layer:
        - WallLayer

- type: entity
  parent: FountainSomberDrains
