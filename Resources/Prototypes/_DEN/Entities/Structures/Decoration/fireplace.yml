- type: entity
  parent: BaseSignDirectional
  id: SomberHangingBrazierGuidebook # Now that the braziers are toggled, the guidebook ones don't burn...
  name: electrum hanging brazier
  description: "An electrum brazier, its smokeless psionic flame rippling like liquid."
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DEN/Structures/Decoration/somberhangingbrazier.rsi
    layers:
      - state: fireplace
      - state: fireplace_fire
        shader: unshaded
        visible: true
        map: ["light"]
