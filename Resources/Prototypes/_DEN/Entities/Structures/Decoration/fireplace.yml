- type: entity
  parent: Fireplace
  id: SomberFireplace
  name: electrum fireplace
  suffix: Click After Mapping
  description: "An avant-garde fireplace shaped like an eye, its smokeless psionic flame rippling like liquid."
  components: # TODO: APRIL HELP MAKE THIS LISTEN TO REMOTE SIGNALLERS PLEASE GOD PLEASE (SO THEY CAN BE TOGGLED WITH SWITCHES)
  - type: Sprite # TODO: IT'D ALSO BE REALLY NICE IF THEY COULD SPAWN TURNED ON SO I CAN MIGRATE ALL THE TURNED-OFF ONES TO BE LIT UP ON MAP SPAWN
    snapCardinals: true
    noRot: true
    drawdepth: Mobs
    sprite: _DEN/Structures/Decoration/somberfireplace.rsi
    layers:
      - state: fireplace
      - state: fireplacefestive
        map: ["christmas"]
        visible: false
      - state: fireplace_fire
        shader: unshaded
        visible: false
        map: ["light"]
  - type: Appearance
  - type: HolidayVisuals
    holidays:
      festive:
      - FestiveSeason
  - type: GenericVisualizer
    visuals:
      enum.HolidayVisuals.Holiday:
        christmas:
          festive: { visible: true }
      enum.ToggleableVisuals.Enabled:
        light:
          True: { visible: true }
          False: { visible: false }
  - type: InteractionOutline
  - type: ItemTogglePointLight
  - type: ItemToggle
    predictable: false
    soundActivate:
      path: /Audio/_DEN/Effects/crystaltap1.ogg
      params:
        volume: -6
        pitch: 0.5
        variation: 0.05
    soundDeactivate:
      path: /Audio/_DEN/Effects/crystaltap2.ogg
      params:
        volume: -6
        pitch: 0.5
        variation: 0.05
  - type: AmbientSound
    enabled: false
    volume: -6
    range: 5
    sound:
      path: /Audio/Ambience/Objects/fireplace.ogg
  - type: UnpoweredFlashlight
  - type: EtherealLight # Dims around ethereal entities
  - type: PointLight
    enabled: false
    radius: 5
    energy: 7
    softness: 1.22
    color: "#4dc4ff"
  - type: ItemToggleHot
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          ScrapElectrum:
            min: 3
            max: 5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.4
        hard: true
        density: 1000
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
        - BulletImpassable
  - type: UseDelay
  - type: Anchorable
  - type: Transform
  - type: Physics
    bodyType: Static

- type: entity
  parent: BaseSignDirectional # So it's technically wall decor, but whatever
  id: SomberHangingBrazier
  name: electrum hanging brazier
  suffix: Click After Mapping
  description: "An electrum brazier, its smokeless psionic flame rippling like liquid."
  placement:
    mode: WallmountLight
  components: # TODO: APRIL HELP MAKE THIS LISTEN TO REMOTE SIGNALLERS PLEASE GOD PLEASE (SO THEY CAN BE TOGGLED WITH SWITCHES)
  - type: Sprite # TODO: IT'D ALSO BE REALLY NICE IF THEY COULD SPAWN TURNED ON SO I CAN MIGRATE ALL THE TURNED-OFF ONES TO BE LIT UP ON MAP SPAWN
    drawdepth: WallMountedItems
    noRot: false
    sprite: _DEN/Structures/Decoration/somberhangingbrazier.rsi
    layers:
      - state: fireplace
      - state: fireplacefestive # It still gets a ribbon when it's Christmas
        map: ["christmas"]
        visible: false
      - state: fireplace_fire
        shader: unshaded
        visible: false
        map: ["light"]
  - type: Appearance
  - type: HolidayVisuals
    holidays:
      festive:
      - FestiveSeason
  - type: GenericVisualizer
    visuals:
      enum.HolidayVisuals.Holiday:
        christmas:
          festive: { visible: true }
      enum.ToggleableVisuals.Enabled:
        light:
          True: { visible: true }
          False: { visible: false }
  - type: UseDelay
  - type: InteractionOutline
  - type: ItemTogglePointLight
  - type: ItemToggle
    predictable: false
    soundActivate:
      path: /Audio/_DEN/Effects/crystaltap1.ogg
      params:
        volume: -6
        pitch: 0.75
        variation: 0.05
    soundDeactivate:
      path: /Audio/_DEN/Effects/crystaltap2.ogg
      params:
        volume: -6
        pitch: 0.75
        variation: 0.05
  - type: AmbientSound
    enabled: false
    volume: -8
    range: 5
    sound:
      path: /Audio/Ambience/Objects/fireplace.ogg
  - type: UnpoweredFlashlight
  - type: EtherealLight # Dims around ethereal entities
  - type: PointLight
    enabled: false
    radius: 4
    energy: 5
    softness: 1.22
    color: "#4dc4ff"
  - type: StaticPrice
    price: 125
  - type: ItemToggleHot
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          ScrapElectrum:
            min: 1
            max: 3

- type: entity
  parent: SomberHangingBrazier
  id: SomberHangingBrazierPillarShorter
  suffix: Fits Shorter Pillars, Click After Mapping
  placement:
    mode: SnapgridCenter
  components:
  - type: SpriteFade
  - type: Sprite
    noRot: true
    offset: "0.0,1.0"
    drawdepth: Mobs # You have to place these after the pillars, but otherwise they won't be hidden by them if the camera turns
    sprite: _DEN/Structures/Decoration/SomberPillarBraziers/somberhangingbrazierpillarshorter.rsi

- type: entity
  parent: SomberHangingBrazierPillarShorter
  id: SomberHangingBrazierPillarShort
  suffix: Fits Short Pillars, Click After Mapping
  components:
  - type: SpriteFade
  - type: Sprite
    sprite: _DEN/Structures/Decoration/SomberPillarBraziers/somberhangingbrazierpillarshort.rsi

- type: entity
  parent: SomberHangingBrazierPillarShorter
  id: SomberHangingBrazierPillarTall
  suffix: Fits Tall Pillars, Click After Mapping
  components:
  - type: SpriteFade
  - type: Sprite
    sprite: _DEN/Structures/Decoration/SomberPillarBraziers/somberhangingbrazierpillartall.rsi

- type: entity
  parent: SomberHangingBrazierPillarShorter
  id: SomberHangingBrazierPillarTaller
  suffix: Fits Taller Pillars, Click After Mapping
  components:
  - type: SpriteFade
  - type: Sprite
