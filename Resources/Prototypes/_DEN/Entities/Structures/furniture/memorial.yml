# Mnemolith columns start
# There's 10 different pillar heights and 20 different writings, so 20 different prototypes total
# The writings, found in the descriptions, are the reagent-effect-mnemolith-heroicdose messages
# The idea is that the pillars shift and change to record the noosphere's thoughts, but it takes a lot of prototypes
- type: entity
  parent: MarkerBase
  id: RandomSomberMemorial
  name: mnemolith column spawner
  description: "The dark stone bears a rare example of psychomantic script, legible to anyone who looks upon it. The inscription shifts each time it's seen."
  suffix: Aim One Tile Up] [Random
  components:
  - type: Sprite
    drawdepth: Overdoors
    sprite: _DEN/Structures/Furniture/Memorials/somber.rsi
    layers:
    - state: somber0
    - state: somber0glow
      shader: unshaded
  - type: RandomSpawner
    prototypes:
      - SomberMemorial1
      - SomberMemorial2
      - SomberMemorial3
      - SomberMemorial4
      - SomberMemorial5
      - SomberMemorial6
      - SomberMemorial7
      - SomberMemorial8
      - SomberMemorial9
      - SomberMemorial10
      - SomberMemorial11
      - SomberMemorial12
      - SomberMemorial13
      - SomberMemorial14
      - SomberMemorial15
      - SomberMemorial16
      - SomberMemorial17
      - SomberMemorial18
      - SomberMemorial19
      - SomberMemorial20
    chance: 1

- type: entity
  parent: Memorial
  id: SomberMemorial1
  name: mnemolith column
  suffix: DO NOT MAP # If you don't use the spawner, they'll be static, when really they should change each time a map is loaded
  description: "The dark stone bears a rare example of psychomantic script, legible to anyone who looks upon it. The shifting inscription currently reads,                         \"DO NOT BE FRIGHTENED.\""
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _DEN/Structures/Furniture/Memorials/somber.rsi
    layers:
    - state: somber1
    - state: somber1glow
      shader: unshaded
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.875,0.1,-0.675"
        density: 1000
        layer:
        - WallLayer

