# Somber chairs start
- type: entity
  parent: [ OfficeChairBase, BasePsionic ]
  id: SomberChairCushion
  name: somber floor cushion
  suffix: Purple
  description: "A textured cushion filled with mnemolith beads."
  placement:
    mode: PlaceFree
  components:
  - type: Sprite
    offset: "0.0,-0.25"
    sprite: _DEN/Structures/Furniture/chairs.rsi
    state: sombercushion-purple
  - type: StaticPrice
    price: 100
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Items/Handling/cloth_drop.ogg
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialCloth:
            min: 3
            max: 5
          MnemolithPowder:
            min: 5
            max: 5
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Strap
    position: Stand
    buckleOffset: "0,-0.05"
    buckleSound:
      path: /Audio/Items/Handling/cloth_drop.ogg
      params:
        volume: -2
        variation: 0.05
    unbuckleSound:
      path: /Audio/Items/Handling/cloth_pickup.ogg
      params:
        volume: -2
        variation: 0.05

- type: entity
