- type: entity
  parent: SomberChairCushion
  id: SomberChairCushionFancy
  name: somber meditation cushion
  suffix: Purple
  description: "A textured meditation cushion filled with mnemolith beads, set within an electrum focus that shapes the flow of the noosphere above it. It resonates with psions who use it, giving off a faint, calming ring."
  components:
  - type: Sprite
    layers:
    - state: sombercushion-underlay
    - state: sombercushion-underlay-unshaded
      shader: unshaded
    - state: sombercushion-purple
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialCloth:
            min: 3
            max: 5
          MnemolithPowder:
            min: 5
            max: 5
          ScrapElectrum:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: SomberChairCushionFancy
  id: SomberChairCushionFancyBlue
  suffix: Blue
  components:
