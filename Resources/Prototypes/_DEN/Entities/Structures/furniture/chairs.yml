    canFoldInsideContainer: false
  - type: Sprite
    sprite: _DEN/Structures/Specific/Mantis/mantischair.rsi
    state: vehicle
  - type: Item
    size: Huge
  - type: Damageable
    damageModifierSet: StrongMetallic
    damageContainer: Inorganic
  - type: StaticPrice
    price: 125
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 3
            max: 3
          ScrapElectrum:
            min: 3
            max: 3
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: MarkerBase
  id: SpawnVehicleMantisChair
  name: mantis chair spawner
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: false # So it can use other snapping modes
  - type: Sprite
    layers:
      - state: green
        shader: unshaded
      - sprite: _DEN/Structures/Specific/Mantis/mantischair.rsi
        state: vehicle
  - type: ConditionalSpawner
    prototypes:
      - SomberChairLeatherMantisWheelchair

- type: entity
  parent: SomberChairLeatherMantisWheelchair
  id: SomberChairLeatherMantisWheelchairFolded
  name: bound mantis chair
  suffix: Folded, Not Tabletop
  description: "An electrum orb concealing strange bluespace mechanisms that let it unfold into a plush leather office chair. Useful for mantes with mobility restrictions, or simply as versatile office furniture."
  placement:
    mode: PlaceFree
  components:
  - type: Sprite
    sprite: _DEN/Structures/Specific/Mantis/mantischair.rsi
    state: vehicle_folded
  - type: Item
    size: Small
  - type: Foldable
    folded: true
  - type: Tag
    tags:
    - MantisBeltStorable
    - DoorBumpOpener

- type: entity
