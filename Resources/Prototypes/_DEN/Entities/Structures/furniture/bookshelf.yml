- type: entity
  parent: [ Bookshelf, BasePsionic ]
  id: BookshelfSomber
  name: somber bookshelf
  description: "A tall, gloomy bookshelf. That's all."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Furniture/somberbookshelf.rsi
  - type: Damageable
    damageModifierSet: Wood
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 3
            max: 3
          ScrapElectrum:
            min: 1
            max: 3
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:EmptyAllContainersBehaviour

- type: entity
  parent: [ BookshelfSomberFill, BookshelfSomber ]
  id: BookshelfSomberFilled
  suffix: Random Filled

# See-through bookshelves so mappers have options

- type: entity
  parent: BookshelfSomber
  id: BookshelfSomberBackless
  suffix: See-Through
  components:
  - type: Sprite
    sprite: _DEN/Structures/Furniture/somberbookshelf.rsi
    layers:
      - state: base-backless
      - state: book-0
      - map: ["enum.StorageFillLayers.Fill"]
  - type: Occluder
    enabled: false

- type: entity
  parent: [ BookshelfSomberFill, BookshelfSomberBackless ]
  id: BookshelfSomberBacklessFilled
  suffix: See-Through, Random Filled
