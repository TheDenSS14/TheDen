
- type: entity
  id: CarpetBlackNarrow
  parent: CarpetBlack
  name: narrow black carpet
  suffix: Tile
  components:
  - type: Sprite
    sprite: _DEN/Structures/Furniture/Carpets/narrow_black_carpet.rsi
  - type: Icon
    sprite: _DEN/Structures/Furniture/Carpets/narrow_black_carpet.rsi
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 10
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:SpawnEntitiesBehavior
            spawn:
              FloorCarpetItemBlackNarrow:
                min: 1
                max: 1

