- type: entity
  parent: BenchBaseMiddle
  id: BenchSomberMiddle
  name: somber bench
  suffix: Amaranth, Middle
  description: "A gloomy steel bench with a polished amaranth wood seat."
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _DEN/Structures/Furniture/Benches/somberbench.rsi
    state: middlepink
  - type: StaticPrice
    price: 125
  - type: Damageable
    damageModifierSet: Metallic
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 3
            max: 3
          ScrapElectrum:
            min: 1
            max: 3
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

