- type: entity
  parent: SinkEmpty
  id: SomberSinkEmpty
  name: somber sink
  suffix: Empty
  description: "A sleek porcelain sink. The water controls are concealed beneath the rim, touch-sensitive and pressure-based, leaving the surface clean and uninterrupted."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Furniture/sombersink.rsi
  - type: StaticPrice
    price: 125
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 300
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 75
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound:
              collection: MetalBreak
          - !type:SpawnEntitiesBehavior
            spawn:
              SheetSteel1:
                min: 1
                max: 2
              ScrapElectrum:
                min: 1
                max: 2


- type: entity
  parent: SomberSinkEmpty
  id: SomberSink
  name: somber sink
  suffix: Water
  components:
  - type: SolutionContainerManager
    solutions:
      drainBuffer:
        maxVol: 200
      tank:
        reagents:
        - ReagentId: Water
          Quantity: 500

- type: entity
  parent: SomberSink
  id: SomberSinkWide
  name: wide somber sink
  components:
    - type: Sprite
      sprite: Structures/Furniture/sink.rsi
      layers:
        - state: sink_wide
        - map: [ "enum.SolutionContainerLayers.Fill" ]
          state: sink_wide-fill-1
          visible: false
    - type: SolutionContainerVisuals
      maxFillLevels: 1
      fillBaseName: sink_wide-fill-
      solutionName: drainBuffer

#Stemless Sink

- type: entity
  parent: SomberSinkEmpty
  id: SomberSinkStemless
  name: somber sink
  suffix: Empty, Stemless
  components:
  - type: Sprite
    sprite: Structures/Furniture/sink.rsi
    layers:
      - state: sink
      - map: [ "enum.SolutionContainerLayers.Fill" ]
        state: sink-fill-1
        visible: false

- type: entity
  parent: SomberSinkStemless
  id: SomberSinkStemlessWater
  name: somber sink
  suffix: Stemless, Water
  components:
  - type: SolutionContainerManager
    solutions:
      drainBuffer:
        maxVol: 100
      tank:
        reagents:
        - ReagentId: Water
          Quantity: 500
