- type: entity
  parent: BaseStructure # Doesn't merge with nearby tables, so I can't parent it
  id: SomberTableCoffee
  name: somber coffee table
  description: "An expensive coffee table made of gloomy, patterned wood."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Furniture/Tables/Somber/somberwoodtablecoffee.rsi
    state: full
    noRot: false
  - type: Icon
    sprite: _DEN/Structures/Furniture/Tables/Somber/somberwoodtablecoffee.rsi
    state: full
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-.8,-0.225,0.8,0.45"
        density: 55
        mask:
        - TableMask
        layer:
        - TableLayer
        - MidImpassable
        - BulletImpassable
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 3
            max: 3
          ScrapElectrum:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: StaticPrice
    price: 125
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepWood
  - type: PlaceableSurface
  - type: Climbable
  - type: Bonkable
    bonkDamage:
      types:
        Blunt: 4
  - type: Clickable
  - type: RequireProjectileTarget
  - type: ThrownItemImmune

