# Somber Tables Start
- type: entity
  parent: [ TableBase, BasePsionic ]
  id: SomberTable
  name: somber table
  suffix: Wood
  description: "An expensive table made of gloomy, patterned wood."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Furniture/Tables/Somber/somberwoodtable.rsi
  - type: Icon
    sprite: _DEN/Structures/Furniture/Tables/Somber/somberwoodtable.rsi
    state: full
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 3
            max: 3
          ScrapElectrum:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 55
        mask:
        - TableMask
        layer:
        - TableLayer
        - MidImpassable
        - BulletImpassable
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepWood

- type: entity
  parent: SomberTable
  id: SomberTableCornerNW
  suffix: Wood, NW Corner] [PLACE SOUTH ONLY
  components:
  - type: Sprite
    sprite: _DEN/Structures/Furniture/Tables/Somber/somberwoodtableNW.rsi
    state: wttable0
  - type: Icon
    sprite: _DEN/Structures/Furniture/Tables/Somber/somberwoodtableNW.rsi
    state: wttable0
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.28125
          offset: "-0.328125,-0.109375"
        density: 55
        mask:
        - TableMask
        layer:
        - MidImpassable
        - BulletImpassable
  - type: IconSmooth
    key: state
    base: wttable
    mode: CardinalFlags # You have no idea what it cost me to make these sprites

