- type: entity
  parent: LightSomberEidoliteWellLamp
  id: LightSomberEidoliteWellLampOn
  description: "An eidolite pyramid that draws energy from the noosphere to produce light, recessed into the ground. The switch on this one takes a few tries..."
  suffix: DO NOT MAP # If you do, it'll appear on, but they'll have to interact with it twice before it turns off again
  categories: [ HideSpawnMenu ] # TODO: Delete this prototype with migration in case any were mapped, it's basically deprecated due to its unintended behavior
