# Floating lamps (not anchored and have little drop shadows), also the parent of the well lamps
- type: entity
  parent: [ LightSomberEidoliteColorBase, BasePsionic ]
  id: LightSomberEidoliteSkyLantern
  name: eidolite sky lantern
  description: "An eidolite pyramid that draws energy from the noosphere to produce light, held aloft by its own power. You can turn it on and off by hand."
  placement:
    mode: PlaceFree
  components:
  - type: ItemToggleOnTrigger
  - type: TriggerOnSignal
  - type: DeviceLinkSink
    ports:
      - Trigger
  - type: Sprite
    drawdepth: Overdoors
    offset: 0.0,0.46875 # 15 pixels up, centering the drop shadow on the tile
    sprite: _DEN/Structures/Lighting/LightPosts/lampeidolitefloating.rsi
    snapCardinals: true
    noRot: true
  - type: SpriteFade
  - type: Physics
    bodyType: Dynamic
  - type: Clickable
  - type: InteractionOutline
  - type: Pullable
  - type: RequireProjectileTarget
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.125
        hard: true
        density: 100
        mask:
        - FlyingMobMask
        layer:
        - FlyingMobLayer
  - type: UseDelay
  - type: EtherealLight # Dims around ethereal entities
  - type: PointLight
    enabled: false
    energy: 1
    radius: 3
    softness: 1.22
  - type: Appearance
  - type: ItemTogglePointLight
  - type: ItemToggle
    activated: true
    soundActivate:
      path: /Audio/_DEN/Effects/crystalshimmer1.ogg
      params:
        volume: -2
        variation: 0.05
    soundDeactivate:
      path: /Audio/_DEN/Effects/crystalshimmer2.ogg
      params:
        volume: -2
        variation: 0.05
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        light:
          True: { visible: true }
          False: { visible: false }
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialEidolite1:
            min: 1
            max: 3
          MaterialMnemolith1:
            min: 1
            max: 3
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak

