# Well lamps (embedded in the floor), also the parent of the floor lamps
- type: entity
  parent: [ LightSomberEidoliteColorBase, LightSomberEidoliteSkyLantern ]
  id: LightSomberEidoliteWellLamp
  name: eidolite well lamp
  description: "An eidolite pyramid that draws energy from the noosphere to produce light, recessed into the ground. You can turn it on and off by hand."
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    drawdepth: HighFloorObjects # So they render above puddles
    offset: 0.0,0.0
    sprite: _DEN/Structures/Lighting/LightPosts/lampeidolitewell.rsi
  - type: Anchorable
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.125
        hard: true
        density: 100
        mask:
        - SmallMobMask
        layer:
        - SmallMobLayer
  - type: PointLight
    energy: 2
    radius: 5
    softness: 1.22

