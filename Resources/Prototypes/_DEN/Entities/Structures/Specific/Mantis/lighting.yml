- type: entity
  parent: LightSomberEidoliteWellLamp
  id: LightSomberEidoliteFloorLamp
  name: eidolite floor lamp
  description: "An eidolite pyramid that draws energy from the noosphere to produce light, mounted on a mnemolith column. You can turn it on and off by hand."
  suffix: Mantis, Magenta] [Click After Mapping
  components:
  - type: SpriteFade
  - type: Sprite
    offset: "0.0, 0.3125"
    sprite: _DEN/Structures/Lighting/LightPosts/lampeidolitefloor.rsi
    drawdepth: Mobs
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.15
          position: -0.0156,0.0156 # Half a pixel left and up from center
        hard: true
        density: 200
        mask:
        - MachineMask
        layer:
        - BulletImpassable
        - MidImpassable
        - LowImpassable
  - type: EtherealLight # Dims around ethereal entities
  - type: PointLight
    enabled: false
    radius: 5
    energy: 7

