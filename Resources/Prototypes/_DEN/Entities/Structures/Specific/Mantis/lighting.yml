# Somber Eidolite Start

# First, abstract parents that handle the different colors
- type: entity
  id: LightSomberEidoliteColorBase
  suffix: Mantis, Magenta] [Signal-Friendly # Mantis-suffixed ones are intended for their offices, mostly, which should look strange and mystic
  abstract: true
  components:
  - type: Sprite # Drawdepths and filepaths are handled in entity prototypes
    layers:
    - state: base
    - state: crystal # These aren't just alpha recolors because the handmade ones look nicer
    - state: glow # But there IS a recolorable alpha sprite included for future contributors, if desired
      shader: unshaded
    - state: crystal
      shader: unshaded
      visible: false
      map: ["light"]
  - type: PointLight # Brightness is handled in entity prototypes
    color: "#d9418d"

- type: entity
  id: LightSomberEidoliteColorUV
  suffix: Mantis, Ultraviolet] [Signal-Friendly
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: base
    - state: crystal-ultraviolet
    - state: glow-ultraviolet
      shader: unshaded
    - state: crystal-ultraviolet
      shader: unshaded
      visible: false
      map: ["light"]
  - type: PointLight
    color: "#9e00ff"

- type: entity
  id: LightSomberEidoliteColorAzure
  suffix: Mantis, Azure] [Signal-Friendly
  abstract: true
  components:
  - type: Sprite
    layers:
