- type: entity
  parent: [ BaseStructure, BasePsionic ]
  id: LightSomberEidoliteWellLamp
  name: eidolite well lamp
  description: "An eidolite pyramid that draws energy from the noosphere to produce light, recessed into the ground. You can turn it on and off by hand."
  suffix: Mantis, Magenta] [Click After Mapping
  components: # TODO: APRIL HELP MAKE THIS LISTEN TO REMOTE SIGNALLERS PLEASE GOD PLEASE (SO THEY CAN BE TOGGLED WITH SWITCHES)
  - type: Sprite # TODO: IT'D ALSO BE REALLY NICE IF THEY COULD SPAWN TURNED ON SO I CAN MIGRATE ALL THE TURNED-OFF ONES TO BE LIT UP ON MAP SPAWN
    sprite: _DEN/Structures/Lighting/LightPosts/lampeidolitewell.rsi
    drawdepth: HighFloorObjects # So they render above puddles
    snapCardinals: true
    noRot: true
    layers:
    - state: base
    - state: crystal
    - state: glow
      shader: unshaded
    - state: crystal
      shader: unshaded
      visible: false
      map: ["light"]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.125
          position: -0.0156,0.0156 # Half a pixel left and up from center
        hard: false
        density: 100
        mask:
        - MachineMask
  - type: UseDelay
  - type: Anchorable
  - type: Transform
  - type: Physics
    bodyType: Static
  - type: InteractionOutline
  - type: EtherealLight # Dims around ethereal entities
  - type: PointLight
    enabled: false
    radius: 4
    energy: 5
    softness: 1.22
    color: "#d9418d"
  - type: Appearance
  - type: ItemTogglePointLight
  - type: ItemToggle
    predictable: false
    soundActivate:
      path: /Audio/_DEN/Effects/crystalshimmer1.ogg
      params:
        volume: -2
        variation: 0.05
    soundDeactivate:
      path: /Audio/_DEN/Effects/crystalshimmer2.ogg
      params:
        volume: -2
        variation: 0.05
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        light:
          True: { visible: true }
          False: { visible: false }
  - type: UnpoweredFlashlight # Powered by the noosphere
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialEidolite1:
            min: 1
            max: 3
          MaterialMnemolith1:
            min: 1
            max: 3
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak

- type: entity
  parent: LightSomberEidoliteWellLamp
