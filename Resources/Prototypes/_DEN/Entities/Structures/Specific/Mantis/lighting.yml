    - state: crystal-azure
    - state: glow-azure
      shader: unshaded
    - state: crystal-azure
      shader: unshaded
      visible: false
      map: ["light"]
  - type: PointLight
    color: "#4dc4ff"

- type: entity
  id: LightSomberEidoliteColorFluorescent
  suffix: General, Fluorescent] [Signal-Friendly # General is for elsewhere on the station, but it's a matter of taste (a whole blue or purple station might suck)
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: base
    - state: crystal-fluorescent
    - state: glow-fluorescent
      shader: unshaded
