- type: entity
  parent: ChurchBell
  id: ChurchBellSomber
  name: electrum bell
  description: "A heavy bell plated in electrum, suspended from a patterned steel beam."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Specific/Chapel/somber-church-bell.rsi
  - type: InteractionPopup
    interactDelay: 1
    successChance: 1
    interactSuccessSound:
      path: /Audio/_DEN/Effects/spookybell.ogg
      params:
        variation: 0.15
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          ScrapElectrum:
            min: 3
            max: 3

# Nazar plates that mappers can use (possibly hidden under other entities) to force chapel ambience in an area
# I tried SubFloorHide but 'blockAmbience: false' doesn't work, at least not with the Prayable component...?
- type: entity
  parent: BaseStructure
  id: SomberNazarPlate
  name: nazar plate
  suffix: Produces Chapel Ambience] [Rotate For Variants
  description: "An eyelike mnemolith plate embedded in the floor to shelter the area from certain metaphysical threats."
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    snapCardinals: false
    noRot: true
    drawdepth: FloorTiles
    sprite: _DEN/Structures/Specific/Chapel/somber-nazar-plate.rsi
    state: icon
  - type: Prayable
    sentMessage: prayer-popup-notify-nazarplate-sent
    notificationPrefix: prayer-chat-notify-nazarplate
    verb: prayer-verbs-nazarplate
    verbImage: null
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.125
        hard: false
        density: 10
  - type: Anchorable
  - type: Transform
    anchored: true
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialMnemolith1:
            min: 3
            max: 4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
