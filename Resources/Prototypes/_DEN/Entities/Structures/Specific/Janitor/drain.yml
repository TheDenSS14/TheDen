- type: entity # Not parented to avoid interaction outlines, why isn't that component nullable
  parent: BasePsionic
  id: FloorDrainSomber
  name: somber drain
  suffix: Tile
  description: "A dark drain shaped to fit seamlessly into the tiles."
  placement:
    mode: SnapgridCenter
  components:
    - type: Sprite
      snapCardinals: false
      noRot: false
      drawdepth: FloorObjects
      sprite: _DEN/Objects/Specific/Janitorial/somberdrain.rsi
      layers:
      - state: tile
      - map: [ "enum.SolutionContainerLayers.Fill" ]
        state: tile-fill-1
        visible: false
    - type: SolutionContainerVisuals
      maxFillLevels: 1
      fillBaseName: tile-fill-
      solutionName: drainBuffer
    - type: Clickable
    - type: Physics
      bodyType: Static
      canCollide: false
    - type: AmbientSound
      enabled: false
      volume: -8
      range: 8
      sound:
        path: /Audio/Ambience/Objects/drain.ogg
    - type: Drain
    - type: DumpableSolution
      solution: drainBuffer
    - type: Appearance
    - type: SolutionContainerManager
      solutions:
        drainBuffer:
          maxVol: 1000
    - type: DrainableSolution
      solution: drainBuffer
    - type: Damageable
      damageContainer: Inorganic
      damageModifierSet: Metallic
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 300
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
        - trigger:
            !type:DamageTrigger
            damage: 150
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:PlaySoundBehavior
              sound:
                collection: MetalBreak

