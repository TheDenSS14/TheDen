# Somber TV Kit
# To make theaters using ComputerSomberTelevision and RemoteSignallerSomberTV
# Only comes in the dark color

- type: entity
  parent: WallSomberDark
  id: SomberTVSpeakerWallLeft
  name: somber sound system
  description: "A sleek surround sound speaker in brushed metal, set into the wall. This system could probably blow the windows out."
  suffix: Speaker Wall, Left] [Somber TV Kit
  components:
  - type: Sprite
    sprite: _DEN/Structures/Walls/Somber/sombertvwalls.rsi
    state: left
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/sombertvwalls.rsi
    state: left
  - type: IconSmooth
    key: walls
    mode: NoSprite

- type: entity
  parent: SomberTVSpeakerWallLeft
  id: SomberTVSpeakerWallRight
  suffix: Speaker Wall, Right] [Somber TV Kit
  components:
