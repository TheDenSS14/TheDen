# Somber TV Kit
# To make theaters using ComputerSomberTelevision and RemoteSignallerSomberTV
# Only comes in the dark color (theaters should be dark anyway, it's fine)

- type: entity
  parent: WallSomberDark
  id: SomberTVSpeakerWallLeft
  name: somber sound system
  description: "A sleek surround sound speaker in brushed metal, set into the wall. This system could probably blow the windows out. Occasionally emits low murmuring."
  suffix: Speaker Wall, Left] [Somber TV Kit
  components:
  - type: Sprite
    sprite: _DEN/Structures/Walls/Somber/sombertvwalls.rsi
    state: left
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/sombertvwalls.rsi
    state: left
  - type: IconSmooth
