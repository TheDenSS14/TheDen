# Standard

- type: entity
  parent: WallReinforced
  id: WallSomber
  name: somber wall
  description: "Layered with rough, slanted mnemolith slabs in a tight grid to prevent psionic scrying."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Walls/Somber/somber.rsi
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/somber.rsi
  - type: Reflect

- type: entity
  parent: WallReinforcedDiagonal
  id: WallSomberDiagonal
  name: somber wall
  suffix: Diagonal
  description: "Layered with dark, rough mnemolith slabs in a tight grid to prevent psionic scrying."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Walls/Somber/somber_diagonal.rsi
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/somber_diagonal.rsi
  - type: Reflect

