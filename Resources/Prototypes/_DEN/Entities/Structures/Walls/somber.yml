# Standard

- type: entity
  parent: WallReinforced
  id: WallSomber
  name: somber wall
  suffix: Reinforced
  description: "Layered with rough, slanted mnemolith slabs in a tight grid to prevent psionic scrying."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Walls/Somber/somber.rsi
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/somber.rsi

- type: entity
  parent: WallReinforcedDiagonal
  id: WallSomberDiagonal
  name: somber wall
  suffix: Diagonal
  description: "Layered with dark, rough mnemolith slabs in a tight grid to prevent psionic scrying."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Walls/Somber/somber_diagonal.rsi
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/somber_diagonal.rsi

- type: entity
  parent: WallSolid # Weaker, better for real maps, but I can't make weak versions of all this or I'll die
  id: WallSomberSolid
  name: somber wall
  suffix: Solid
  description: "Made of gloomy, patterned steel."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Walls/Somber/somber.rsi
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/somber.rsi

