# Standard

- type: entity
  parent: [ WallReinforced, BasePsionic ]
  id: WallSomber
  name: somber wall
  description: "Layered with dark, rough mnemolith slabs in a tight grid to prevent psionic scrying."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Walls/Somber/somber.rsi
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/somber.rsi

- type: entity
  parent: [ WallReinforcedDiagonal, BasePsionic ]
  id: WallSomberDiagonal
  name: somber wall
  suffix: Diagonal
  description: "Layered with dark, rough mnemolith slabs in a tight grid to prevent psionic scrying."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Walls/Somber/somber_diagonal.rsi
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/somber_diagonal.rsi

- type: entity
  parent: WallSomberDiagonal
  id: WallSomberDiagonalEnd
  suffix: Diagonal End
  components:
  - type: Sprite
    sprite: _DEN/Structures/Walls/Somber/somber_diagonal_end.rsi
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/somber_diagonal_end.rsi
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PolygonShape
            vertices:
            - "-0.5,-0.5"
            - "0.0,0.0"
            - "0.5,-0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 2000

- type: entity
  parent: [ WallSolid, BasePsionic ] # Weaker, better for real maps, but I can't make weak versions of all this or I'll die (if you wanna help be my guest)
  id: WallSomberSolid
  name: somber wall
  suffix: Solid
  description: "Made of gloomy, patterned steel. It hums faintly, just below hearing."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Walls/Somber/somber.rsi
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/somber.rsi

