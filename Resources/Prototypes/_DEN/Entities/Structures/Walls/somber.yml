# Grilles

- type: entity
  parent: Grille
  id: GrilleSomber
  name: somber grille
  description: "A lattice of patterned steel rods."
  components:
    - type: Sprite
      sprite: _DEN/Structures/Walls/Somber/sombergrille.rsi
    - type: Icon
      sprite: _DEN/Structures/Walls/Somber/sombergrille.rsi
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 100
          behaviors:
            - !type:DoActsBehavior
              acts: ["Destruction"]

- type: entity
  parent: GrilleBroken
  id: GrilleSomberBroken
  name: somber grille
  description: "A lattice of patterned steel rods. Broken, now."
  suffix: Broken
  components:
    - type: Sprite
      sprite: _DEN/Structures/Walls/Somber/sombergrille.rsi
    - type: Icon
      sprite: _DEN/Structures/Walls/Somber/sombergrille.rsi
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 10
          behaviors:
            - !type:DoActsBehavior
              acts: ["Destruction"]

- type: entity
  parent: GrilleDiagonal
  id: GrilleSomberDiagonal
  name: somber grille
  description: "A lattice of patterned steel rods."
  suffix: Diagonal
  components:
    - type: MeleeSound
      soundGroups:
        Brute:
          path:
            "/Audio/Weapons/grille_hit.ogg"
    - type: Sprite
      sprite: _DEN/Structures/Walls/Somber/sombergrille.rsi
    - type: Icon
      sprite: _DEN/Structures/Walls/Somber/sombergrille.rsi
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 100
          behaviors:
            - !type:DoActsBehavior
              acts: ["Destruction"]

# Railings

- type: entity
  parent: Railing
  id: RailingSomber
  name: somber railing
  description: "A sturdy, patterned rail."
  suffix: Straight
  components:
  - type: Sprite
    drawdepth: Walls # So they won't display over diagonal walls...
    sprite: _DEN/Structures/Walls/Somber/somberrailing.rsi
    state: side
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/somberrailing.rsi
    state: side
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          PartRodMetal1:
            min: 0
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

