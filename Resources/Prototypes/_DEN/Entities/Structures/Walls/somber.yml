# Grilles

- type: entity
  parent: [ Grille, BasePsionic ]
  id: GrilleSomber
  name: somber grille
  description: "A lattice of patterned steel rods. They seem to shift slightly when you look away."
  components:
    - type: Sprite
      sprite: _DEN/Structures/Walls/Somber/sombergrille.rsi
    - type: Icon
      sprite: _DEN/Structures/Walls/Somber/sombergrille.rsi
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 100
          behaviors:
            - !type:DoActsBehavior
              acts: ["Destruction"]

- type: entity
  parent: [ GrilleBroken, BasePsionic ]
  id: GrilleSomberBroken
  name: somber grille
  description: "A lattice of patterned steel rods. They seem to shift slightly when you look away. Broken, now."
  suffix: Broken
  components:
    - type: Sprite
      sprite: _DEN/Structures/Walls/Somber/sombergrille.rsi
    - type: Icon
      sprite: _DEN/Structures/Walls/Somber/sombergrille.rsi
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 10
          behaviors:
            - !type:DoActsBehavior
              acts: ["Destruction"]

- type: entity
  parent: [ GrilleDiagonal, BasePsionic ]
  id: GrilleSomberDiagonal
  name: somber grille
  description: "A lattice of patterned steel rods. They seem to shift slightly when you look away."
  suffix: Diagonal
  components:
    - type: MeleeSound
      soundGroups:
        Brute:
          path:
            "/Audio/Weapons/grille_hit.ogg"
    - type: Sprite
      sprite: _DEN/Structures/Walls/Somber/sombergrille.rsi
    - type: Icon
      sprite: _DEN/Structures/Walls/Somber/sombergrille.rsi
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 100
          behaviors:
            - !type:DoActsBehavior
              acts: ["Destruction"]

# Railings

- type: entity
  parent: [ Railing, BasePsionic ]
  id: RailingSomber
  name: somber railing
  description: "A sturdy, patterned rail. The lines seem to ripple in the presence of psions. Why can't things just be normal."
  suffix: Straight
  components:
  - type: Sprite
    drawdepth: Walls # So they won't display over diagonal walls...
    sprite: _DEN/Structures/Walls/Somber/somberrailing.rsi
    state: side
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/somberrailing.rsi
    state: side
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          PartRodMetal1:
            min: 0
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

