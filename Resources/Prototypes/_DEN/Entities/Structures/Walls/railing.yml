- type: entity
  parent: Railing
  id: RailingSomber
  name: somber railing
  description: "A sturdy, patterned rail."
  suffix: Straight
  components:
  - type: Sprite
    drawdepth: Walls # So they won't display over diagonal walls...
    sprite: _DEN/Structures/Walls/Somber/somberrailing.rsi
    state: side
  - type: Icon
    sprite: _DEN/Structures/Walls/Somber/somberrailing.rsi
    state: side
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          PartRodMetal1:
            min: 0
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

