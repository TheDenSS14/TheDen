# Somber switches start
- type: entity
  parent: [ SignalSwitchDirectional, BasePsionic ]
  id: SignalSwitchSomber
  name: somber signal switch
  suffix: Directional
  description: "A brushed metal switch, shaped like an eye."
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi

- type: entity
  parent: [ SignalButtonDirectional, BasePsionic ]
  id: SignalButtonSomber
  name: somber signal button
  suffix: Directional
  description: "A brushed metal button, shaped like an eye."
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi
    state: base

# Lockable buttons

- type: entity
  parent: [ LockableButton, BasePsionic ]
  id: LockableButtonSomber
  name: somber lockable button
  suffix: Unprogrammed
  description: "A brushed metal button, shaped like an eye. It closes when locked."
  categories: [] # If mappers want more than these they'll have to configure them themselves, sorry...
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberResearch
  suffix: Epistemics
  components:
  - type: AccessReader
    access: [["Research"]]

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberChapel
  suffix: Chapel
  components:
  - type: AccessReader
    access: [["Chapel"]]

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberMantis
  suffix: Mantis
  components:
  - type: AccessReader
    access: [["Mantis"]]

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberResearchDirector
  suffix: Mystagogue
  components:
  - type: AccessReader
    access: [["ResearchDirector"]]

# Button frames

- type: entity
  parent: [ ButtonFrame, BasePsionic ]
  id: ButtonFrameSomberGold
  name: somber signal button frame
  suffix: Gold
  description: "A gold button frame shaped like an eye."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi
    state: framegold

- type: entity
  parent: [ ButtonFrame, BasePsionic ]
  id: ButtonFrameSomberMagenta
  name: somber signal button frame
  suffix: Magenta
  description: "A magenta button frame shaped like an eye."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi
    state: framepink

- type: entity
  parent: [ ButtonFrame, BasePsionic ]
  id: ButtonFrameSomberPurple
  name: somber signal button frame
  suffix: Purple
  description: "A purple button frame shaped like an eye."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi
    state: framepurple

# Timers

- type: entity
  parent: [ SignalTimer, BasePsionic ]
  id: SomberSignalTimer
  name: somber signal timer
  suffix: Directional, 5 seconds
  description: "A brushed metal timer that sends a signal after a delay."
  components:
  - type: SignalTimer
    delay: 5
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi

- type: entity
  parent: SomberSignalTimer
  id: SomberSignalTimer4
  suffix: Directional, 4 seconds
  components:
  - type: SignalTimer
    delay: 4

- type: entity
  parent: SomberSignalTimer
  id: SomberSignalTimer3
  suffix: Directional, 3 seconds
  components:
  - type: SignalTimer
    delay: 3

- type: entity
  parent: SomberSignalTimer
  id: SomberSignalTimer2
  suffix: Directional, 2 seconds
  components:
  - type: SignalTimer
    delay: 2

- type: entity
  parent: SomberSignalTimer
  id: SomberSignalTimer1
  suffix: Directional, 1 second
  components:
  - type: SignalTimer
    delay: 1
# Somber switches end
