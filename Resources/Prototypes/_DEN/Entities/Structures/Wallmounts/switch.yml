# Somber switches start
- type: entity
  parent: [ SignalSwitchDirectional, BasePsionic ]
  id: SignalSwitchSomber
  name: somber signal switch
  suffix: Directional
  description: "A brushed metal switch, shaped like an eye."
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi

- type: entity
  parent: [ SignalButtonDirectional, BasePsionic ]
  id: SignalButtonSomber
  name: somber signal button
  suffix: Directional
  description: "A brushed metal button shaped like an eye."
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi
    state: base

- type: entity
  parent: SignalButtonSomber
  id: SignalButtonSomberLeft
  suffix: Directional, Left
  components:
  - type: Sprite
    state: base-left

- type: entity
  parent: SignalButtonSomber
  id: SignalButtonSomberRight
  suffix: Directional, Right
  components:
  - type: Sprite
    state: base-right

# Autolinking Buttons

- type: entity
  parent: SignalButtonSomber
  id: SignalButtonSomberAutolinkFog
  suffix: Autolink (Fog), Directional
  components:
  - type: AutoLinkTransmitter
    channel: Fog

- type: entity
  parent: SignalButtonSomber
  id: SignalButtonSomberAutolinkTint1
  suffix: Autolink (Tint 1), Directional
  components:
  - type: AutoLinkTransmitter
    channel: Tint1

- type: entity
  parent: SignalButtonSomber
  id: SignalButtonSomberAutolinkTint2
  suffix: Autolink (Tint 2), Directional
  components:
  - type: AutoLinkTransmitter
    channel: Tint2

- type: entity
  parent: SignalButtonSomber
  id: SignalButtonSomberAutolinkTint3
  suffix: Autolink (Tint 3), Directional
  components:
  - type: AutoLinkTransmitter
    channel: Tint3

- type: entity
  parent: SignalButtonSomber
  id: SignalButtonSomberAutolinkInvisShutter
  suffix: Autolink (Invisible Shutter), Directional
  components:
  - type: AutoLinkTransmitter
    channel: InvisShutter

# Lockable buttons

- type: entity
  parent: [ LockableButton, BasePsionic ]
  id: LockableButtonSomber
  name: somber lockable button
  suffix: Unprogrammed
  description: "A brushed metal button shaped like an eye. It closes when locked."
  categories: [] # If mappers want more than these they'll have to configure them themselves, sorry...
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberResearch
  suffix: Epistemics
  components:
  - type: AccessReader
    access: [["Research"]]

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberChapel
  suffix: Chapel
  components:
  - type: AccessReader
    access: [["Chapel"]]

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberMantis
  suffix: Mantis
  components:
  - type: AccessReader
    access: [["Mantis"]]

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberResearchDirector
  suffix: Mystagogue
  components:
  - type: AccessReader
    access: [["ResearchDirector"]]

# Button frames

- type: entity
  parent: [ ButtonFrame, BasePsionic ]
  id: ButtonFrameSomberGold
  name: somber signal button frame
  suffix: Gold, Glows In Dark
  description: "A gold button frame shaped like an eye."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi
    layers:
    - state: framegold
    - state: framegold-unshaded
      shader: unshaded

- type: entity
  parent: ButtonFrameSomberGold
  id: ButtonFrameSomberGoldLeft
  suffix: Gold, Left, Glows In Dark
  components:
  - type: Sprite
    layers:
    - state: framegold-left
    - state: framegold-left-unshaded
      shader: unshaded

- type: entity
