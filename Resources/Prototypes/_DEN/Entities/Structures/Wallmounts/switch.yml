# Timers

- type: entity
  parent: [ SignalTimer, BasePsionic ]
  id: SomberSignalTimer
  name: somber signal timer
  suffix: Directional, 5 seconds
  description: "A brushed metal timer that sends a signal after a delay."
  components:
  - type: SignalTimer
    delay: 5
  - type: Sprite
    drawdepth: Items
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi
    state: on

- type: entity
  parent: SomberSignalTimer
  id: SomberSignalTimer1
  suffix: Directional, 1 second
  components:
  - type: SignalTimer
    delay: 1

- type: entity
  parent: SomberSignalTimer
  id: SomberSignalTimerLeft
  suffix: Directional, Left, 5 seconds
  components:
  - type: SignalTimer
    delay: 5
  - type: Sprite
    state: on-left
    delay: 1

- type: entity
  parent: SomberSignalTimerLeft
  id: SomberSignalTimerLeft1
  suffix: Directional, Left, 1 second
  components:
  - type: SignalTimer
    delay: 1

- type: entity
  parent: SomberSignalTimer
  id: SomberSignalTimerRight
  suffix: Directional, Right, 5 seconds
  components:
  - type: SignalTimer
    delay: 5
  - type: Sprite
    state: on-right

- type: entity
  parent: SomberSignalTimerRight
  id: SomberSignalTimerRight1
  suffix: Directional, Right, 1 second
  components:
  - type: SignalTimer
    delay: 1

- type: entity
  parent: SomberSignalTimer
  id: SomberSignalTimerCenter
  suffix: Center, 5 seconds
  components:
  - type: SignalTimer
    delay: 5
  - type: Sprite
    state: on-center
  - type: WallMount
    arc: 360

- type: entity
  parent: SomberSignalTimerCenter
  id: SomberSignalTimerCenter1
  suffix: Center, 1 seconds
  components:
  - type: SignalTimer
    delay: 1
