  - type: SignalTimer
    delay: 4

- type: entity
  parent: SomberSignalTimer
  id: SomberSignalTimerLeft3
  suffix: Directional, Left, 3 seconds
  components:
  - type: SignalTimer
    delay: 3

- type: entity
  parent: SomberSignalTimerLeft
  id: SomberSignalTimerLeft2
  suffix: Directional, Left, 2 seconds
  components:
  - type: SignalTimer
    delay: 2

- type: entity
  parent: SomberSignalTimerLeft
  id: SomberSignalTimerLeft1
  suffix: Directional, Left, 1 second
  components:
  - type: SignalTimer
    delay: 1

- type: entity
  parent: SomberSignalTimer
  id: SomberSignalTimerRight
  suffix: Directional, Right, 5 seconds
  components:
  - type: SignalTimer
    delay: 5
  - type: Sprite
    state: on-right

- type: entity
  parent: SomberSignalTimerRight
  id: SomberSignalTimerRight4
  suffix: Directional, Right, 4 seconds
  components:
  - type: SignalTimer
    delay: 4

- type: entity
  parent: SomberSignalTimerRight
  id: SomberSignalTimerRight3
  suffix: Directional, Right, 3 seconds
  components:
  - type: SignalTimer
    delay: 3

- type: entity
  parent: SomberSignalTimerRight
  id: SomberSignalTimerRight2
  suffix: Directional, Right, 2 seconds
