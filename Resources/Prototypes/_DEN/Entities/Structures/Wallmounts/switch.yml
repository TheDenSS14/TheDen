# Somber switches start
- type: entity
  parent: [ SignalSwitchDirectional, BasePsionic ]
  id: SignalSwitchSomber
  name: somber signal switch
  suffix: Directional
  description: "A brushed metal switch shaped like an eye."
  components:
  - type: Sprite
    drawdepth: Items # Necessary to display over frames, which display over panels
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi # There are sprites for centered, left, and right switches...but who uses switches...
  - type: Transform
    anchored: false

- type: entity
  parent: [ SignalButton, BasePsionic ]
  id: SignalButtonSomberCenter
  name: somber signal button
  suffix: Center
  description: "A brushed metal button shaped like an eye."
  placement:
    mode: SnapgridCenter
    snap:
    - Wallmount
  components:
  - type: Sprite
    drawdepth: Items
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi
    state: base-center
  - type: WallMount
    arc: 360

- type: entity
  parent: [ SignalButtonDirectional, BasePsionic ]
  id: SignalButtonSomber
  name: somber signal button
  suffix: Directional
  description: "A brushed metal button shaped like an eye."
  components:
  - type: Sprite
    drawdepth: Items
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi
    state: base

- type: entity
  parent: SignalButtonSomber
  id: SignalButtonSomberLeft
  suffix: Directional, Left
  components:
  - type: Sprite
    state: base-left

- type: entity
  parent: SignalButtonSomber
  id: SignalButtonSomberRight
  suffix: Directional, Right
  components:
  - type: Sprite
    state: base-right

# Autolinking Buttons

- type: entity
  parent: SignalButtonSomber
  id: SignalButtonSomberAutolinkFog
  suffix: Autolink (Fog), Directional
  components:
  - type: AutoLinkTransmitter
    channel: Fog

- type: entity
  parent: SignalButtonSomber
  id: SignalButtonSomberAutolinkTint1
  suffix: Autolink (Tint 1), Directional
  components:
  - type: AutoLinkTransmitter
    channel: Tint1

- type: entity
  parent: SignalButtonSomber
  id: SignalButtonSomberAutolinkTint2
  suffix: Autolink (Tint 2), Directional
  components:
  - type: AutoLinkTransmitter
    channel: Tint2

- type: entity
  parent: SignalButtonSomber
  id: SignalButtonSomberAutolinkTint3
  suffix: Autolink (Tint 3), Directional
  components:
  - type: AutoLinkTransmitter
    channel: Tint3

- type: entity
  parent: SignalButtonSomber
  id: SignalButtonSomberAutolinkInvisShutter
  suffix: Autolink (Invisible Shutter), Directional
  components:
  - type: AutoLinkTransmitter
    channel: InvisShutter

# Lockable buttons

- type: entity
  parent: [ LockableButton, BasePsionic ]
  id: LockableButtonSomber
  name: somber signal button (locking)
  suffix: Unprogrammed, Directional
  description: "A brushed metal button shaped like an eye. It closes when locked."
  categories: [] # If mappers want more than these they'll have to configure them themselves, sorry...
  components:
  - type: LockVisuals
    stateLocked: locked
  - type: Sprite
    drawdepth: Items
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi
    layers:
    - state: base
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberLeft
  suffix: Unprogrammed, Left
  components:
  - type: LockVisuals
    stateLocked: locked-left
  - type: Sprite
    layers:
    - state: base-left
    - state: locked-left
      map: ["enum.LockVisualLayers.Lock"]

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberRight
  suffix: Unprogrammed, Right
  components:
  - type: LockVisuals
    stateLocked: locked-right
  - type: Sprite
    layers:
    - state: base-right
    - state: locked-right
      map: ["enum.LockVisualLayers.Lock"]

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberCenter
  suffix: Unprogrammed, Center
  components:
  - type: LockVisuals
    stateLocked: locked-center
  - type: Sprite
    layers:
    - state: base-center
    - state: locked-center
      map: ["enum.LockVisualLayers.Lock"]
  - type: WallMount
    arc: 360

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberMantis
  suffix: Mantis, Directional
  components:
  - type: AccessReader
    access: [["Mantis"]]

- type: entity
  parent: LockableButtonSomberLeft
  id: LockableButtonSomberMantisLeft
  suffix: Mantis, Directional, Left
  components:
  - type: AccessReader
    access: [["Mantis"]]

- type: entity
  parent: LockableButtonSomberRight
  id: LockableButtonSomberMantisRight
  suffix: Mantis, Directional, Right
  components:
  - type: AccessReader
    access: [["Mantis"]]

- type: entity
  parent: LockableButtonSomberCenter
  id: LockableButtonSomberMantisCenter
  suffix: Mantis, Center
  components:
  - type: AccessReader
    access: [["Mantis"]]
  - type: WallMount
    arc: 360

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberResearch
  suffix: Epistemics # These guys don't get the varied directions, there's already so many prototypes filling up the entity list here...
  components:
  - type: AccessReader
    access: [["Research"]]

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberChapel
  suffix: Chapel
  components:
  - type: AccessReader
    access: [["Chapel"]]

- type: entity
  parent: LockableButtonSomber
  id: LockableButtonSomberResearchDirector
  suffix: Mystagogue
  components:
  - type: AccessReader
    access: [["ResearchDirector"]]

# Button frame panels

- type: entity
  parent: ButtonFrameSomberGold
  id: ButtonFrameSomberPanelThree
  name: somber signal button panel
  suffix: Three, SnapGrid Directional Frames/Buttons # Fits around frames/buttons where they land naturally
  description: "An inset panel that fits three somber buttons."
  components:
  - type: Sprite
    drawdepth: SmallObjects # Display over tables, but under frames/buttons
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi
    layers:
    - state: panel-three

- type: entity
  parent: ButtonFrameSomberPanelThree
  id: ButtonFrameSomberPanelFour
  name: somber signal button panel
  suffix: Four, PlaceFree Directional Frames/Buttons # Have to manually place things, and don't use Center ones or you can press them through walls
  description: "An inset panel that fits four somber buttons."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Wallmounts/somberswitch.rsi
    layers:
    - state: panel-four

