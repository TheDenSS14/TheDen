- type: entity
  parent: [ ShelfBase, BasePsionic ]
  id: SomberDoorCloset
  name: somber closet door
  suffix: Steel
  description: "Gloomy steel doors concealing what is ostensibly a walk-in closet, although you shouldn't try it."
  placement:
    mode: SnapgridCenter
    snap:
    - Wallmount
  components:
  - type: Storage # Duffel sized
    maxItemSize: Huge
    grid:
    - 0,0,7,4
    storageOpenSound:
      path: /Audio/Effects/door_open.ogg
      params:
        volume: -5
    storageCloseSound:
      path: /Audio/Effects/door_close.ogg
      params:
        volume: -5
    storageInsertSound: /Audio/Items/Handling/drinkglass_drop.ogg
    storageRemoveSound: /Audio/Items/Handling/drinkglass_pickup.ogg
    clickInsert: false
  - type: Sprite
    snapCardinals: false
    noRot: false
    sprite: _DEN/Structures/Storage/Shelfs/somberdoorcloset.rsi
    layers:
    - state: open
      map: ["enum.StorageVisualLayers.Base"]
    - state: closed
      map: ["enum.StorageVisualLayers.Door"]
  - type: Appearance
  - type: EntityStorageVisuals
    stateDoorOpen: open
    stateDoorClosed: closed
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel:
            min: 2
            max: 2
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
  - type: WallMount
    arc: 175
  - type: Fixtures # If you specify bounding boxes here, WallMount's arc breaks and stops rotating...

