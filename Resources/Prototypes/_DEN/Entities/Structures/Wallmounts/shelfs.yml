- type: entity
  parent: [ ShelfBase, BasePsionic ] # Technically a tablemounted item, rather than wallmounted
  id: SomberCabinetsWood
  name: somber counter cabinets
  suffix: Wood] [Place On Counters
  description: "What kind of counter doesn't have cabinets."
  placement:
    mode: SnapgridCenter
  components:
  - type: Storage # Two cabinets around a small drawer and a big drawer
    grid:
    - 0,0,1,3
    - 3,0,4,0
    - 3,2,4,3
    - 6,0,7,3
    maxItemSize: Large
  - type: Sprite
    drawdepth: SmallObjects # Render over tables, but not items
    sprite: _DEN/Structures/Storage/Shelfs/somberwoodcountercabinet.rsi
    layers:
    - state: closed
      map: ["enum.StorageVisualLayers.Base"]
    - state: closed
      map: ["enum.StorageVisualLayers.Door"]
  - type: Appearance
  - type: EntityStorageVisuals
    stateDoorOpen: open
    stateDoorClosed: closed
  - type: WallMount
    arc: 175
  - type: Fixtures # If you specify bounding boxes here, WallMount's arc breaks and stops rotating...
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 1
            max: 3
      - !type:EmptyAllContainersBehaviour

