- type: entity
  parent: ShelfBase
  id: SomberDoorCloset
  name: somber closet
  description: "Gloomy steel doors concealing what is ostensibly a walk-in closet, although you shouldn't try it."
  components:
  - type: Storage # Duffel sized
    maxItemSize: Huge
    grid:
    - 0,0,7,4
  - type: Sprite
    snapCardinals: false
    noRot: false
    sprite: _DEN/Structures/Storage/Shelfs/somberdoorcloset.rsi
    layers:
    - state: open
      map: ["enum.StorageVisualLayers.Base"]
    - state: closed
      map: ["enum.StorageVisualLayers.Door"]
  - type: Appearance
  - type: EntityStorageVisuals
    stateDoorOpen: open
    stateDoorClosed: closed
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel:
            min: 2
            max: 2
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam

