# Directional

- type: entity
  parent: WindowReinforcedDirectional
  id: WindowSomberDirectional
  name: somber window
  suffix: Directional
  description: "Your reflection shimmers faintly in the glass."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber_directional.rsi
    state: somber
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber_directional.rsi
    state: somber

- type: entity
  parent: WindowSomberDirectional
  id: WindowSomberDirectionalTinted
  name: somber window (tinted)
  suffix: Directional
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber_directional.rsi
    state: somberdarktinted
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber_directional.rsi
    state: somberdarktinted
  - type: Occluder
    boundingBox: "-0.5,-0.5,0.5,-0.3"

- type: entity
  parent: WindowSomberDirectional
  id: WindowSomberDarkDirectional
  name: somber window
  suffix: Directional, Dark
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber_directional.rsi
    state: somberdark
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber_directional.rsi
    state: somberdark

- type: entity
  parent: WindowSomberDarkDirectional
  id: WindowSomberDarkDirectionalTinted
  name: somber window (tinted)
  suffix: Directional, Dark
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber_directional.rsi
    state: somberdarktinted
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber_directional.rsi
    state: somberdarktinted
  - type: Occluder
    boundingBox: "-0.5,-0.5,0.5,-0.3"

- type: entity
  parent: WindowSomberDirectional
  id: WindowSomberDirectionalCorner
  suffix: Directional Corner
  description: "Your reflection shimmers faintly in the glass."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber_directional.rsi
    state: sombercorner
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber_directional.rsi
    state: sombercorner
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "0.36,-0.49,0.49,-0.36"
        density: 1500
        mask:
        - FullTileMask
        layer:
        - GlassLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageVisuals
    damageOverlay:
      sprite: _DEN/Structures/Windows/cracks_corner.rsi

- type: entity
  parent: WindowSomberDirectionalCorner
  id: WindowSomberDarkDirectionalCorner
  suffix: Directional Corner, Dark
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber_directional.rsi
    state: somberdarkcorner
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber_directional.rsi
    state: somberdarkcorner

- type: entity
  parent: WindowSomberDirectionalCorner
  id: WindowSomberDirectionalTintedCorner
