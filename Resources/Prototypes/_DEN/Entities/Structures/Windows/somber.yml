- type: entity
  parent: [ ReinforcedUraniumWindow, BasePsionic ]
  id: WindowSomberUranium
  name: shielded somber window
  suffix: Radiation Shielding
  description: "Built with occult-treated uranium shielding to keep you safe from radiation. Ignore the whispering."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber_shielded.rsi
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber_shielded.rsi
