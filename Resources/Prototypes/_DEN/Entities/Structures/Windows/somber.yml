# Somber TV Kit
# To make theaters using ComputerSomberTelevision and RemoteSignallerSomberTV
# Only comes in the dark color

- type: entity
  parent: WindowSomberDark
  id: SomberTVSpeakerWindowLeft
  name: somber sound system
  description: "A sleek surround sound speaker in brushed metal, set into the wall. This system could probably blow the windows out. Occasionally emits low murmuring."
  suffix: Speaker Window, Left] [Somber TV Kit
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: left
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: left
  - type: IconSmooth
    key: walls
    mode: NoSprite

- type: entity
  parent: SomberTVSpeakerWindowLeft
  id: SomberTVSpeakerWindowRight
  suffix: Speaker Window, Right] [Somber TV Kit
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: right
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: right

- type: entity
  parent: SomberTVSpeakerWindowLeft
  id: SomberTVSpeakerWindowMiddle
  suffix: Speaker Window, Middle] [Somber TV Kit
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: middle
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: middle

- type: entity
  parent: SomberTVSpeakerWindowLeft # Useful if the TV's on an exterior wall so you can see space behind it
  id: SomberTVSpeakerWindow # It does have glass slits, so you can see through it
  name: somber window
  description: "Your reflection shimmers faintly in the glass."
  suffix: TV Backing Window, See-Through] [Somber TV Kit
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: tvback
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: tvback

- type: entity
  parent: [ BaseStructure, BasePsionic ] # Debatably, these are directional windows
  id: SomberTVSpeakerBig
  name: somber sound system
  description: "A sleek surround sound speaker in brushed metal, set into the wall. This system could probably blow the windows out. Occasionally emits low murmuring."
  suffix: Speaker Window/Wall Attachment, Big] [Somber TV Kit
  placement:
    mode: SnapgridCenter
    snap:
    - Window
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/sombertvspeakers.rsi
    drawdepth: FloorObjects
    state: wallspeakerbig
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/sombertvspeakers.rsi
    state: wallspeakerbig
  - type: WallMount
    arc: 360
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.36"
        hard: false
        density: 1500
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: MeleeSound
    soundGroups:
      Brute:
        collection: MetalThud
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: InteractionVerbs
    allowedVerbs:
    - KnockOn
    - HugObject
    - PetObject
    - KissObject
    - LickObject

- type: entity
  parent: SomberTVSpeakerBig
  id: SomberTVSpeakerSmall
  name: somber sound system
  suffix: Speaker Window/Wall Attachment, Small] [Somber TV Kit
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/sombertvspeakers.rsi
    state: wallspeakersmall
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/sombertvspeakers.rsi
    state: wallspeakersmall

- type: entity
  parent: SomberTVSpeakerBig
  id: SomberTVSpeakerSteel
  name: somber sound system
  suffix: Speaker, Matches Walls] [Somber TV Kit
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/sombertvspeakers.rsi
    state: wallspeakersteel
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/sombertvspeakers.rsi
    state: wallspeakersteel

- type: entity
  parent: SomberTVSpeakerBig
  id: SomberTVSpeakerMnemolith
  name: somber sound system
  suffix: Speaker, Matches Diagonal Walls] [Somber TV Kit
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/sombertvspeakers.rsi
    state: wallspeakermnemolith
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/sombertvspeakers.rsi
    state: wallspeakermnemolith
