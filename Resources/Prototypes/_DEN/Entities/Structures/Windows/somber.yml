# Directional

- type: entity
  parent: WindowReinforcedDirectional
  id: WindowSomberDirectional
  name: somber window
  suffix: Directional
  description: "Your reflection shimmers faintly in the glass."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber_directional.rsi
    state: somber
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber_directional.rsi
    state: somber

- type: entity
  parent: WindowSomberDirectional
  id: WindowSomberDirectionalTinted
  name: somber window (tinted)
  suffix: Directional
  components:
  - type: Sprite
    state: sombertinted
  - type: Icon
    state: sombertinted
  - type: Occluder
    boundingBox: "-0.5,-0.5,0.5,-0.3"

- type: entity
  parent: WindowSomberDirectional
  id: WindowSomberDarkDirectional
  name: somber window
  suffix: Directional, Dark
  components:
  - type: Sprite
    state: somberdark
  - type: Icon
    state: somberdark

- type: entity
  parent: WindowSomberDarkDirectional
  id: WindowSomberDarkDirectionalTinted
  name: somber window (tinted)
  suffix: Directional, Dark
  components:
  - type: Sprite
    state: somberdarktinted
  - type: Icon
    state: somberdarktinted
  - type: Occluder
    boundingBox: "-0.5,-0.5,0.5,-0.3"

- type: entity
  parent: WindowSomberDirectional
  id: WindowSomberDirectionalCorner
  suffix: Directional Corner
  description: "Your reflection shimmers faintly in the glass."
  components:
  - type: Sprite
    drawdepth: OverMobs # Otherwise it z-fights with directional windows
    state: sombercorner
  - type: Icon
    state: sombercorner
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "0.36,-0.49,0.49,-0.36"
        density: 1500
        mask:
        - FullTileMask
        layer:
        - GlassLayer
  - type: DamageVisuals
    damageOverlay:
      sprite: _DEN/Structures/Windows/cracks_corner.rsi

- type: entity
  parent: WindowSomberDirectionalCorner
  id: WindowSomberDarkDirectionalCorner
  suffix: Directional Corner, Dark
  components:
  - type: Sprite
    state: somberdarkcorner
  - type: Icon
    state: somberdarkcorner

- type: entity
  parent: WindowSomberDirectionalCorner
  id: WindowSomberDirectionalTintedCorner
  name: somber window (tinted)
  suffix: Directional Corner
  components:
  - type: Sprite
    state: sombertintedcorner
  - type: Icon
    state: sombertintedcorner
  - type: Occluder
    boundingBox: "0.3,-0.5,0.5,-0.3"

- type: entity
  parent: WindowSomberDirectionalCorner
  id: WindowSomberDarkDirectionalTintedCorner
  name: somber window (tinted)
  suffix: Directional Corner, Dark
  components:
  - type: Sprite
    state: somberdarktintedcorner
  - type: Icon
    state: somberdarktintedcorner
  - type: Occluder
    boundingBox: "0.3,-0.5,0.5,-0.3"

# Somber TV Kit
# To make theaters using ComputerSomberTelevision and RemoteSignallerSomberTV
# Only comes in the dark color

- type: entity
  parent: WindowSomberDark
  id: SomberTVSpeakerWindowLeft
  name: somber sound system
  description: "A sleek surround sound speaker in brushed metal, set into the wall. This system could probably blow the windows out. Occasionally emits low murmuring."
  suffix: Speaker Window, Left] [Somber TV Kit
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: left
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: left
  - type: IconSmooth
    key: walls
    mode: NoSprite

- type: entity
  parent: SomberTVSpeakerWindowLeft
  id: SomberTVSpeakerWindowRight
  suffix: Speaker Window, Right] [Somber TV Kit
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: right
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: right

- type: entity
  parent: SomberTVSpeakerWindowLeft
  id: SomberTVSpeakerWindowMiddle
  suffix: Speaker Window, Middle] [Somber TV Kit
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: middle
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: middle

- type: entity
  parent: SomberTVSpeakerWindowLeft # Useful if the TV's on an exterior wall so you can see space behind it
  id: SomberTVSpeakerWindow # It does have glass slits, so you can see through it
  name: somber window
  description: "Your reflection shimmers faintly in the glass."
  suffix: TV Backing Window, See-Through] [Somber TV Kit
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: tvback
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/sombertvwindows.rsi
    state: tvback
