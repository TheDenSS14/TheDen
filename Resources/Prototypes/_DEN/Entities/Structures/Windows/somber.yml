# Standard

- type: entity
  parent: [ ReinforcedWindow, BasePsionic ]
  id: WindowSomber
  name: somber window
  description: "Your reflection shimmers faintly in the glass."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber.rsi
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber.rsi
  - type: IconSmooth
    key: walls
    base: window

- type: entity
  parent: WindowSomber
  id: WindowSomberNoSmoothing
  suffix: No Smoothing
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber.rsi
    state: full
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber.rsi
    state: full
  - type: IconSmooth
    key: walls
    mode: NoSprite

- type: entity
  parent: [ ReinforcedWindowDiagonal, BasePsionic ]
  id: WindowSomberDiagonal
  name: somber window
  suffix: Diagonal
  description: "Your reflection shimmers faintly in the glass."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber_diagonal.rsi
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber_diagonal.rsi
  - type: IconSmooth
    mode: Diagonal
    key: walls
    base: state

- type: entity
  parent: WindowSomberDiagonal
  id: WindowSomberDiagonalEnd
  suffix: Diagonal End
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber_diagonal_end.rsi
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber_diagonal_end.rsi
  - type: DamageVisuals
    thresholds: [4, 8, 12]
    damageDivisor: 10
    trackAllDamage: true
    damageOverlay:
      sprite: Structures/Windows/cracks_directional.rsi
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PolygonShape
            vertices:
            - "-0.5,-0.5"
            - "0.0,0.0"
            - "0.5,-0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 2000

- type: entity
  parent: WindowSomberDiagonal
  id: WindowSomberDiagonalFramed
  name: somber window
  suffix: Diagonal, Framed
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber_diagonal_framed.rsi
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber_diagonal_framed.rsi
  - type: IconSmooth
    mode: Diagonal
    key: walls
    base: state

- type: entity
  parent: WindowSomberDiagonal
  id: WindowSomberDiagonalFramedLeft
  name: somber window
  suffix: Diagonal, Framed, Left
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber_diagonal_framed_left.rsi
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber_diagonal_framed_left.rsi
  - type: IconSmooth
    mode: Diagonal
    key: walls
    base: state

- type: entity
  parent: WindowSomberDiagonal
  id: WindowSomberDiagonalFramedMiddle
  name: somber window
  suffix: Diagonal, Framed, Middle
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber_diagonal_framed_middle.rsi
  - type: Icon
    sprite: _DEN/Structures/Windows/Somber/somber_diagonal_framed_middle.rsi
  - type: IconSmooth
    mode: Diagonal
    key: walls
    base: state

- type: entity
  parent: WindowSomberDiagonal
  id: WindowSomberDiagonalFramedRight
  name: somber window
  suffix: Diagonal, Framed, Right
  components:
  - type: Sprite
    sprite: _DEN/Structures/Windows/Somber/somber_diagonal_framed_right.rsi
