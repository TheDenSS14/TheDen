    key: walls
    base: window

- type: entity
  parent: [ ReinforcedUraniumWindowDiagonal, BasePsionic ]
  id: WindowSomberUraniumDiagonal
  name: shielded somber window
  suffix: Diagonal, Radiation Shielding
  description: "Built with occult-treated uranium shielding to keep you safe from radiation. Ignore the whispering."
