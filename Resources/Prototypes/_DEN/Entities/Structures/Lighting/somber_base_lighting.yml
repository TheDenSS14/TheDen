# Tube Fixtures
- type: entity
  parent: PoweredlightEmpty
  id: PoweredlightSomberEmpty
  suffix: Empty
  name: electrum light
  description: "An ornate light fixture. It needs power, and a light tube. Everyone knows that."
  components:
  - type: Sprite
    sprite: _DEN/Structures/Wallmounts/Lighting/somber_light_tube.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:EmptyAllContainersBehaviour
      - !type:SpawnEntitiesBehavior
        spawn:
          ScrapElectrum:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak

- type: entity
  parent: Poweredlight
  id: PoweredlightSomber
  suffix: ""
  name: electrum light
  description: "An ornate light fixture. It needs power, and a light tube. Everyone knows that."
  categories: [HideSpawnMenu]
  components:
  - type: Sprite
    sprite: _DEN/Structures/Wallmounts/Lighting/somber_light_tube.rsi
  - type: Destructible
    thresholds:
    - trigger:
