- type: entity
  parent: PoweredlightSomber
  id: PoweredlightSomberFluorescent
  suffix: Fluorescent
  components:
  - type: PoweredLight
    hasLampOnSpawn: LightTube
  - type: PointLight
    color: "#FFE4CE"
    energy: 0.8
    radius: 10
    softness: 1

- type: entity
