# Standard Stairs

- type: entity
  parent: [ Stairs, BasePsionic ]
  id: StairSomberSteel
  name: somber steel stairs
  suffix: ""
  components:
  - type: Sprite
    sprite: _DEN/Structures/stairs.rsi
    state: stairs_somber_steel
    drawdepth: FloorTiles

- type: entity
  parent: StairSomberSteel
  id: StairSomberSteelDark
  name: somber dark steel stairs
  suffix: ""
  components:
  - type: Sprite
    sprite: _DEN/Structures/stairs.rsi
    state: stairs_somber_steel_dark
    drawdepth: FloorTiles

- type: entity
  parent: StairSomberSteel
  id: StairSomberWood
  name: somber wood stairs
  suffix: ""
  components:
  - type: Sprite
    sprite: _DEN/Structures/stairs.rsi
    state: stairs_somber_wood
    drawdepth: FloorTiles
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 2
            max: 4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: StairSomberWood
  id: StairSomberWoodAmaranth
  name: somber wood stairs (amaranth)
  suffix: ""
  components:
  - type: Sprite
    sprite: _DEN/Structures/stairs.rsi
    state: stairs_somber_wood_amaranth
    drawdepth: FloorTiles

- type: entity
  parent: StairSomberWood
  id: StairSomberWoodFloral
  name: somber wood stairs (floral)
  suffix: ""
  components:
  - type: Sprite
    sprite: _DEN/Structures/stairs.rsi
    state: stairs_somber_wood_floral
    drawdepth: FloorTiles

- type: entity
  parent: StairSomberWood
  id: StairSomberWoodShadow
  name: somber wood stairs (shadow)
  suffix: ""
  components:
  - type: Sprite
    sprite: _DEN/Structures/stairs.rsi
    state: stairs_somber_wood_shadow
    drawdepth: FloorTiles

- type: entity
  parent: StairSomberWood
  id: StairSomberAmaranth
  name: somber ornate amaranth stairs
  suffix: ""
  components:
  - type: Sprite
    sprite: _DEN/Structures/stairs.rsi
    state: stairs_somber_amaranth
    drawdepth: FloorTiles
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 2
            max: 4
          ScrapElectrum:
            min: 1
            max: 3
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: StairSomberSteel
  id: StairSomberMnemolith
  name: somber mnemolith stairs
  suffix: ""
  components:
  - type: Sprite
    sprite: _DEN/Structures/stairs.rsi
    state: stairs_somber_mnemolith
    drawdepth: FloorTiles
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialMnemolith1:
            min: 10
            max: 20
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

