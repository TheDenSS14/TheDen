

- type: entity
  parent: FloorWaterEntity
  id: SomberWater
  name: somber water
  description: "Only water."
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _DEN/Tiles/Planet/Somber/water.rsi
    layers:
    - state: water
    - state: watershine
      shader: unshaded
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,0.1,0.4,0.4"
        layer:
          - SlipLayer
        mask:
          - ItemMask
        density: 1000
        hard: false
      fishing:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,0.1,0.4,0.4"
        layer:
        - ItemMask
        mask:
        - HighImpassable
        density: 1000
        hard: false

- type: entity
  parent: FloorWaterEntityPool
  id: SomberPoolWater
  name: somber pool
  description: "Deeper than one would expect, and kept heated to a comfortable temperature."
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _DEN/Tiles/Planet/Somber/water.rsi
    layers:
    - state: poolwater
    - state: watershine
      shader: unshaded
  - type: Fixtures # These pools won't grab you from half a tile away
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,0.1,0.4,0.4"
        layer:
          - SlipLayer
        mask:
          - ItemMask
        density: 1000
        hard: false
      fishing:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,0.1,0.4,0.4"
        layer:
        - ItemMask
        mask:
        - HighImpassable
        density: 1000
        hard: false

