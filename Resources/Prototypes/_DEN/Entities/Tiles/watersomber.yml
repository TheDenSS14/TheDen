# Waterfalls

- type: entity
  parent: [SomberWater, FloorWaterfallBase]
  id: FloorWaterfallEntitySomber
  name: somber waterfall
  suffix: Non-Occluded
  description: "Dark water, like something drawn up from far below. But there is nothing down there."
  components:
  - type: Sprite
    drawdepth: Overdoors
    sprite: _DEN/Tiles/Planet/Somber/waterfall.rsi
    layers:
    - state: waterfall
    - state: waterfallshine
      shader: unshaded
  - type: AmbientSound
    volume: 0
    range: 8
    sound:
      path: /Audio/_DEN/Effects/Fluids/waterfall.ogg

- type: entity
  parent: FloorWaterfallEntitySomber
  id: FloorWaterfallEntityOccludedSomber
  suffix: Occluded
  components:
  - type: Occluder

- type: entity
  parent: [SomberPoolWater, FloorWaterfallBase]
  id: FloorWaterfallEntitySomberPool
  name: somber pool waterfall
  suffix: Non-Occluded
  description: "Dark water, like something drawn up from far below. But there is nothing down there."
  components:
  - type: Sprite
    drawdepth: Overdoors
    sprite: _DEN/Tiles/Planet/Somber/waterfall.rsi
    layers:
    - state: pooltile
    - state: waterfallcut
      offset: 0,0.125 # 4 pixels up to reach the spout
    - state: pooltile
    - state: waterfallshinecut
      offset: 0,0.125
      shader: unshaded

# Waterfall Spouts

- type: entity
  parent: [ BaseStructure, BasePsionic ]
  id: SomberPoolWaterfallSpout
  name: somber pool waterfall spout
  suffix: Wall
  description: "A narrow spout set into the wall, providing fresh water from hidden filters."
  components:
  - type: Sprite
    drawdepth: BlastDoors # One layer lower than the waterfall itself
