- type: entity
  id: FloorObliterationEntity
  name: obliteration
  suffix: Avoid Mapping
  description: A pool of liquid destruction that will rapidly unmake anything that touches it.
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: TileEmission
    color: "#111111"
  - type: StepTrigger
    requiredTriggeredSpeed: 0
    intersectRatio: 0.1
    blacklist:
      tags:
        - Catwalk
    triggerGroups:
      types:
        - Lava
  - type: TileEntityEffect
    effects:
    - !type:AdjustTemperature
      amount: -10000 # thermal energy, not temperature!
    - !type:ModifyBleedAmount
      amount: 20
    - !type:MovespeedModifier
      walkSpeedModifier: 0.4
      sprintSpeedModifier: 0.4
    - !type:HealthChange
      damage:
        types:
          Asphyxiation: 12
          Bloodloss: 12
          Blunt: 12
          Slash: 12
          Piercing: 12
          Heat: 12
          Cold: 12
          Shock: 12
          Poison: 12
          Caustic: 12
          Radiation: 12
          Structural: 12
          Holy: 12
  - type: Transform
    anchored: true
  - type: SyncSprite
  - type: Clickable
  - type: Sprite
    sprite: _DEN/Tiles/Planet/obliteration.rsi
    drawdepth: BelowFloor
    layers:
      - state: obliteration
        shader: unshaded
  - type: Icon
    sprite: _DEN/Tiles/Planet/obliteration.rsi
    state: full
  - type: IconSmooth
    key: floor
    base: obliteration
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        layer:
          - SlipLayer
        mask:
          - ItemMask
        density: 1000
        hard: false
    # Goobstation - fishing
    #  fishing:
    #    shape:
    #      !type:PhysShapeCircle
    #      radius: 0.4
    #    layer:
    #    - ItemMask
    #    mask:
    #    - HighImpassable
    #    density: 1000
    #    hard: false
    # Goobstation - fishing
  - type: Tag
    tags:
      - HideContextMenu
  - type: SoundOnTrigger
    sound: /Audio/Effects/ominous.ogg