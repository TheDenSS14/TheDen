- type: polymorph
  id: Mouse
  configuration:
    entity: MobMouse
    forced: true
    duration: 30

- type: polymorph
  id: Chicken
  configuration:
    entity: MobChicken
    forced: true
    inventory: Drop

- type: polymorph
  id: Monkey
  configuration:
    entity: MobMonkey
    forced: true
    inventory: Drop
    revertOnCrit: true
    revertOnDeath: true

- type: polymorph
  id: WizardForcedCarp
  configuration:
    entity: MobCarpMagic
    forced: true
    inventory: None
