- type: job
  id: Captain
  name: job-name-captain
  description: job-description-captain
  playTimeTracker: JobCaptain
  requirements:
     - !type:CharacterDepartmentTimeRequirement
       department: Security
       min: 36000
     - !type:CharacterDepartmentTimeRequirement
       department: Logistics
       min: 36000
     - !type:CharacterDepartmentTimeRequirement
       department: Engineering
       min: 36000
     - !type:CharacterDepartmentTimeRequirement
       department: Medical
       min: 36000
     - !type:CharacterDepartmentTimeRequirement
       department: Epistemics
       min: 36000
     - !type:CharacterDepartmentTimeRequirement
       department: Civilian
       min: 36000
  weight: 20
  startingGear: CaptainGear
  icon: "JobIconCaptain"
  requireAdminNotify: true
  joinNotifyCrew: true
  whitelisted: true
  supervisors: job-supervisors-centcom
  canBeAntag: false
  accessGroups:
  - AllAccess
  special:
  - !type:AddImplantSpecial
    implants: [] # SHA
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
      # SHA EDITS START
      - type: BloodCultist # So only she can wield her magic weapons
      - type: BloodCultSpellsHolder # So she can summon them
      - type: Psionic
        removable: false
        roller: false # Don't need more powers than this
        powerSlots: 100 # So she never increases Glimmer
      - type: NightVision
        color: "#4dc4ff"
        activateSound:
          path: /Audio/Effects/eye_open.ogg
          params:
            volume: -5
            variation: 0.075
        deactivateSound:
          path: /Audio/Effects/eye_close.ogg
          params:
            volume: -5
            variation: 0.075
      - type: ThermalVision # The order of these components affects their position in the action bar so I don't have to rearrange everything every time I use Telegnosis
        pulseTime: 2
        lightRadius: 0
        color: "#4dc4ff"
        activateSound:
          path: /Audio/_White/BloodCult/veilin.ogg
          params:
            volume: -3
            variation: 0.075
        deactivateSound:
          path: /Audio/_White/BloodCult/veilout.ogg
          params:
            volume: -3
            variation: 0.075
      - type: InnatePsionicPowers
        powersToAdd:
        - HypnosisPower #5
        - TelegnosisPower #6
        - DarkSwapPower #7
        - HealingWordPower #8
        - PowerOverwhelming
        - XenoglossyPower
        - TelepathyPower
        - PsychognomyPower
      - type: ActionGrant
        actions:
        - ActionBreakSummonFaust
        - ActionBreakSummonMansusGrasp
        - ActionBreakSummonMansusGraspDouble
        - ActionBreakSummonBloodyBlade
        - ActionBreakApparition
        - ActionBreakCoronation
      # SHA EDITS END
  afterLoadoutSpecial:
  - !type:ModifyEnvirosuitSpecial
    charges: 8
  - !type:ModifyEnvirohelmSpecial
    powerCell: PowerCellMedium

- type: startingGear
  id: CaptainGear
  subGear:
  - CaptainPlasmamanGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitCaptain
    back: ClothingBackpackCaptainFilled
    shoes: ClothingShoesBootsLaceup
    # SHA EDITS START
    id: ForensicMantisPDA
    ears: ClothingHeadsetMantis
    belt: ClothingBeltBreak
    pocket1: MantisCaseAdmin
    # SHA EDITS END
  innerClothingSkirt: ClothingUniformJumpskirtCaptain
  satchel: ClothingBackpackSatchelCaptainFilled
  duffelbag: ClothingBackpackDuffelCaptainFilled

- type: startingGear
  id: CaptainPlasmamanGear
  parent: BasePlasmamanGear
  equipment:
    jumpsuit: ClothingUniformEnvirosuitCaptain
    head: ClothingHeadEnvirohelmCaptain
    gloves: ClothingHandsGlovesCaptain
