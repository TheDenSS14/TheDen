- type: job
  id: Captain
  name: job-name-captain
  description: job-description-captain
  playTimeTracker: JobCaptain
  requirements:
    - !type:CharacterPlaytimeRequirement
      tracker: JobQuartermaster # DeltaV - Logistics Department replacing Cargo
      min: 7200 # The Den - 2 hour
    - !type:CharacterPlaytimeRequirement
      tracker: JobChiefEngineer
      min: 7200 # The Den - 2 hour
    - !type:CharacterPlaytimeRequirement
      tracker: JobChiefMedicalOfficer
      min: 7200 # The Den - 2 hour
    - !type:CharacterPlaytimeRequirement
      tracker: JobHeadOfSecurity
      min: 7200 # The Den - 2 hour
    - !type:CharacterPlaytimeRequirement # DeltaV - Epistemics dept time requirement
      tracker: JobResearchDirector # DeltaV - Epistemics Department replacing Science
      min: 7200 # The Den - 2 hour
    - !type:CharacterPlaytimeRequirement # DeltaV - Epistemics dept time requirement
      tracker: JobHeadOfPersonnel # DeltaV - Epistemics Department replacing Science
      min: 7200 # The Den - 2 hour
    - !type:CharacterOverallTimeRequirement
      min: 144000 # The Den - 40 hour
  weight: 20
  startingGear: CaptainGear
  icon: "JobIconCaptain"
  requireAdminNotify: true
  joinNotifyCrew: true
  whitelisted: true
  supervisors: job-supervisors-centcom
  canBeAntag: false
  accessGroups:
  - AllAccess
  special:
  - !type:AddImplantSpecial
    implants: [] # SHA
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
      # SHA EDITS START
      - type: BloodCultist # So only she can wield her Faust
      - type: BloodCultSpellsHolder # So she can summon her Faust
      - type: Psionic
        removable: false
        roller: false
        powerSlots: 100 # So she never increases Glimmer
      - type: NightVision
        color: "#4dc4ff"
        activateSound:
          path: /Audio/Effects/eye_open.ogg
          params:
            volume: -3
            variation: 0.075
        deactivateSound:
          path: /Audio/Effects/eye_close.ogg
          params:
            volume: -3
            variation: 0.075
      - type: ThermalVision # The order of these components affects their position in the action bar so I don't have to rearrange everything every time I use Telegnosis
        pulseTime: 2
        lightRadius: 0
        color: "#4dc4ff"
        activateSound:
          path: /Audio/_White/BloodCult/veilin.ogg
          params:
            volume: -3
            variation: 0.075
        deactivateSound:
          path: /Audio/_White/BloodCult/veilout.ogg
          params:
            volume: -3
            variation: 0.075
      - type: InnatePsionicPowers
        powersToAdd:
        - HypnosisPower #5
        - DispelPower #6
        - TelegnosisPower #7
        - DarkSwapPower #8
        - MassSleepPower #9
        - HealingWordPower #0
        - PowerOverwhelming
        - XenoglossyPower
        - TelepathyPower
        - PsychognomyPower
      - type: ActionGrant
        actions:
        - ActionBreakSummonMansusGrasp
        - ActionBreakSummonGuns
        - ActionBreakSummonFaust
        - ActionBreakSummonBloodyBlade
      # SHA EDITS END
  afterLoadoutSpecial:
  - !type:ModifyEnvirosuitSpecial
    charges: 8
  - !type:ModifyEnvirohelmSpecial
    powerCell: PowerCellMedium

- type: startingGear
  id: CaptainGear
  subGear:
  - CaptainPlasmamanGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitCaptain
    back: ClothingBackpackCaptainFilled
    shoes: ClothingShoesBootsLaceup
    id: ForensicMantisPDA # SHA
    ears: ClothingHeadsetMantis # SHA
    belt: ClothingBeltWaistPenthouse # SHA
  innerClothingSkirt: ClothingUniformJumpskirtCaptain
  satchel: ClothingBackpackSatchelCaptainFilled
  duffelbag: ClothingBackpackDuffelCaptainFilled

- type: startingGear
  id: CaptainPlasmamanGear
  parent: BasePlasmamanGear
  equipment:
    jumpsuit: ClothingUniformEnvirosuitCaptain
    head: ClothingHeadEnvirohelmCaptain
    gloves: ClothingHandsGlovesCaptain
