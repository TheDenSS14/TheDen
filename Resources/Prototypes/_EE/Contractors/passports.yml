- type: entity
  parent: BaseItem
  id: BasePassport
  abstract: true
  name: Orravion entry permit
  suffix: PENTHOUSE
  description: "Impossible to obtain without wealth, legal cause, or a sponsor. Presuming you're not an official resident, it will not last--do not overstay your welcome."
  components:
    - type: Item
      size: Tiny
    - type: Passport
    - type: UseDelay
      delay: 0.5
    - type: Sprite
      sprite: _SHA/Contractors/Passport.rsi
      layers:
      - state: passport_orravion_open
      - state: passport_species_thaven
    - type: Appearance
    - type: EmitSoundOnPickup
      sound: /Audio/SimpleStation14/Items/Handling/book_pickup.ogg
    - type: EmitSoundOnDrop
      sound: /Audio/SimpleStation14/Items/Handling/book_drop.ogg
    - type: EmitSoundOnLand
      sound: /Audio/SimpleStation14/Items/Handling/book_drop.ogg

