- type: entity
  parent: BaseItem
  id: NTCQCManual
  name: Nanotrasen CQC Manual
  description: A small, blue manual. There are drawn instructions of tactical hand-to-hand combat.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Misc/cqc_manual.rsi
    layers:
    - state: icon-alt
  - type: Item
    size: Small
  - type: StaticPrice
    price: 3000
  - type: GrantCqc


- type: entity
  parent: [ BaseBlueshieldOfficerContraband, BaseHandheldComputer ] #TheDen Contraband Parents
  id: HandheldCrewMonitorBSO
  name: handheld command monitor
  description: A handheld crew monitor modified for blueshield officer's needs. Designed to inject a tracking device into command personnel and alarm you about them being in danger.
  components:
  - type: Item # den
    sprite: _DEN/Objects/Specific/Command/handheld_command_monitor.rsi
    heldPrefix: commmon # thats 3 Ms. COMMand MONitor. hehe
    size: Small
  - type: Sprite # den
    sprite: _DEN/Objects/Specific/Command/handheld_command_monitor.rsi
    state: icon
    layers:
      - state: icon
      - state: command_monitor
        shader: unshaded
        visible: true
        map: [ "enum.PowerDeviceVisualLayers.Powered" ]
  - type: Appearance # den
  - type: GenericVisualizer #den
    visuals:
      enum.PowerCellSlotVisuals.Enabled:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: CrewMonitorScanning
    whitelist:
      components:
      - CommandStaff
  - type: ActivatableUI
    key: enum.CrewMonitoringUIKey.Key
  - type: UserInterface
    interfaces:
      enum.CrewMonitoringUIKey.Key:
        type: CrewMonitoringBoundUserInterface
  - type: CrewMonitoringConsole
    alertsEnabled: false # TheDen - They already have a notification and the beep goes off when anyone dies, so just disable
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: CrewMonitor
  - type: WirelessNetworkConnection
    range: 500
  - type: StationLimitedNetwork
  - type: StaticPrice
    price: 1000
  - type: Speech
    speechSounds: Borg

- type: entity # den, for power states (and also there just wasnt an empty one)
  id: HandheldCrewMonitorBSOEmpty
  parent: HandheldCrewMonitorBSO
  suffix: Empty 
  components:
  - type: Sprite
    sprite: _DEN/Objects/Specific/Command/handheld_command_monitor.rsi
    state: icon
    layers:
      - state: icon
      - state: command_monitor
        shader: unshaded
        visible: false
        map: [ "enum.PowerDeviceVisualLayers.Powered" ]
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default

