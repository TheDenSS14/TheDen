- type: entity
  id: CigCartonSpirits
  parent: CigCartonGreen
  name: Spirits carton
  description: "A carton containing six packs of Spirits."
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Consumable/Smokeables/Cigarettes/Cartons/spirits.rsi
    layers:
      - state: closed
      - state: open
        map: ["openLayer"]
  - type: Item
    sprite: _Impstation/Objects/Consumable/Smokeables/Cigarettes/Cartons/spirits.rsi
  - type: StorageFill
    contents:
      - id: CigPackSpirits
        amount: 6

- type: entity
  id: CigCartonMixedRejects
  parent: [CigCartonGreen, BaseRivalCompanyContraband]
  name: Dan's Soaked Smokes Rejects carton
  description: A carton containing 6 packets of Dan's Soaked Smokes Rejects, plus an exclusive Syndicate-branded flippo.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Consumable/Smokeables/Cigarettes/Cartons/mixedrejectscarton.rsi
  - type: Item
    sprite: _Impstation/Objects/Consumable/Smokeables/Cigarettes/Cartons/mixedrejectscarton.rsi
  - type: StorageFill
    contents:
    - id: CigPackMixedRejects
      amount: 6
    - id: InterdyneFlippo
      amount: 1
  - type: Storage
    grid:
    - 0,0,5,1
    - 6,1,6,1
