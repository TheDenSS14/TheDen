  parent: CigPackBase
  name: Spirits
  description: "An artisan line of cigarettes made from genetically-engineered tobacco that smells like wood smoke when burnt."
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Consumable/Smokeables/Cigarettes/Packs/spirits.rsi
